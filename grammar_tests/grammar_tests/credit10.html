<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подготовка к зачёту — Иностранный язык</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background-color: #fff;
    background-image: linear-gradient(#b3d1f7 1px, transparent 1px), linear-gradient(90deg, #b3d1f7 1px, transparent 1px);
    background-size: 28px 28px;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 2rem 1rem 3rem;
  }
  .card {
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    border: 1.5px solid #c8dff7;
    padding: 2rem 2rem 2.5rem;
    max-width: 680px; width: 100%;
    box-shadow: 0 4px 24px rgba(55,138,221,0.10);
  }
  h1 { text-align: center; font-size: 20px; font-weight: 700; color: #185FA5; margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 13px; color: #5b8dc7; margin-bottom: 1.5rem; }
  .progress-bar { height: 7px; background: #dbeafe; border-radius: 99px; margin-bottom: 1rem; overflow: hidden; }
  .progress-fill { height: 100%; background: #378ADD; border-radius: 99px; transition: width 0.4s ease; }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .q-counter { font-size: 12px; color: #7aa8d4; }
  .q-tag { font-size: 11px; background: #e0eeff; color: #185FA5; padding: 2px 9px; border-radius: 99px; font-weight: 600; }
  .q-text { font-size: 17px; font-weight: 600; color: #1a2e4a; margin-bottom: 1.2rem; line-height: 1.6; }
  .q-text code { font-family: Arial, sans-serif; background: #e8f2ff; color: #185FA5; padding: 1px 7px; border-radius: 5px; font-weight: 700; font-size: 17px; }
  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt-btn {
    padding: 11px 16px; border: 1.5px solid #c8dff7; border-radius: 10px;
    background: #f5f9ff; color: #1a2e4a; font-size: 15px; cursor: pointer;
    text-align: left; transition: background 0.13s, border-color 0.13s, transform 0.1s;
    font-family: Arial, sans-serif;
  }
  .opt-btn:hover:not(:disabled) { background: #dbeafe; border-color: #378ADD; transform: translateX(3px); }
  .opt-btn.correct { background: #d1fadf; border-color: #22c55e; color: #14532d; font-weight: 600; }
  .opt-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #7f1d1d; }
  .opt-btn:disabled { cursor: default; transform: none; }
  .open-wrap { display: flex; flex-direction: column; gap: 10px; }
  .open-input {
    padding: 11px 14px; border: 1.5px solid #c8dff7; border-radius: 10px;
    font-size: 15px; color: #1a2e4a; font-family: Arial, sans-serif;
    background: #f5f9ff; outline: none; transition: border-color 0.15s;
  }
  .open-input:focus { border-color: #378ADD; background: #fff; }
  .open-input.correct { background: #d1fadf; border-color: #22c55e; color: #14532d; }
  .open-input.wrong { background: #fee2e2; border-color: #ef4444; }
  .check-btn {
    padding: 10px 22px; border-radius: 10px; border: 1.5px solid #378ADD;
    background: #378ADD; color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: Arial, sans-serif; align-self: flex-start;
    transition: background 0.15s;
  }
  .check-btn:hover { background: #185FA5; }
  .check-btn:disabled { background: #9dc6ee; border-color: #9dc6ee; cursor: default; }
  .feedback { margin-top: 0.8rem; font-size: 14px; min-height: 20px; line-height: 1.6; }
  .feedback.ok { color: #15803d; font-weight: 500; }
  .feedback.err { color: #b91c1c; }
  .next-btn {
    margin-top: 1.1rem; padding: 10px 26px; border-radius: 10px;
    border: 1.5px solid #378ADD; background: #378ADD; color: #fff;
    font-size: 14px; font-weight: 600; cursor: pointer; display: none;
    font-family: Arial, sans-serif; transition: background 0.15s;
  }
  .next-btn:hover { background: #185FA5; }
  .result-card { text-align: center; padding: 1.5rem 0.5rem 0.5rem; }
  .result-emoji { font-size: 52px; margin-bottom: 0.8rem; }
  .result-score { font-size: 40px; font-weight: 700; color: #185FA5; }
  .result-label { font-size: 14px; color: #7aa8d4; margin: 0.3rem 0 1.2rem; }
  .result-msg { font-size: 15px; color: #1a2e4a; margin-bottom: 1.5rem; line-height: 1.7; max-width: 440px; margin-left: auto; margin-right: auto; }
  .restart-btn {
    padding: 11px 32px; border-radius: 10px; border: 1.5px solid #378ADD;
    background: #378ADD; color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: Arial, sans-serif; transition: background 0.15s;
  }
  .restart-btn:hover { background: #185FA5; }
  .mistakes-list { text-align: left; border-top: 1px solid #dbeafe; padding-top: 1.2rem; margin-top: 1.2rem; }
  .mistakes-list h3 { font-size: 14px; font-weight: 600; color: #7aa8d4; margin-bottom: 0.75rem; }
  .mistake-item { font-size: 13px; color: #1a2e4a; padding: 9px 13px; background: #f5f9ff; border-radius: 8px; margin-bottom: 7px; border-left: 3px solid #22c55e; }
  .mistake-item .m-q { color: #7aa8d4; margin-bottom: 3px; font-size: 12px; }
  .mistake-item .m-a { color: #15803d; font-weight: 600; }
  #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

.send-status { margin-top: 10px; font-size: 13px; font-weight: 600; min-height: 20px; }
.send-status.ok { color: #14532d; }
.send-status.err { color: #7f1d1d; }
.name-input { padding: 9px 14px; border-radius: 8px; border: 1.5px solid #c8dff7; font-size: 14px; width: 100%; box-sizing: border-box; margin-bottom: 8px; font-family: Arial, sans-serif; }
.name-input.err { border-color: #ef4444; }

#timer-status { min-height: 18px; }
#timer-status.timer-on  { color: #b45309; }
#timer-status.timer-off { color: #6b7280; }

  .toggle-row { display:flex; align-items:center; gap:10px; background:#f5f9ff; border:1.5px solid #dbeafe; border-radius:10px; padding:10px 14px; margin-bottom:1rem; }
  .toggle-label { flex:1; text-align:left; font-size:13px; color:#1a2e4a; font-weight:600; }
  .toggle-sub { font-size:11px; color:#7aa8d4; font-weight:400; display:block; margin-top:1px; }
  .toggle-switch { position:relative; width:44px; height:24px; flex-shrink:0; }
  .toggle-switch input { opacity:0; width:0; height:0; }
  .toggle-slider { position:absolute; inset:0; background:#c8dff7; border-radius:99px; cursor:pointer; transition:background .25s; }
  .toggle-slider:before { content:""; position:absolute; width:18px; height:18px; left:3px; top:3px; background:#fff; border-radius:50%; transition:transform .25s; box-shadow:0 1px 4px rgba(0,0,0,.15); }
  .toggle-switch input:checked + .toggle-slider { background:#378ADD; }
  .toggle-switch input:checked + .toggle-slider:before { transform:translateX(20px); }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="card">
  <h1>Подготовка к зачёту</h1>
  <p class="subtitle">Иностранный язык · 1 курс · 1 вариант · 10 случайных вопросов из 25</p>

  <div id="start-screen" style="text-align:center; padding:1rem 0 1.5rem;">
      <div style="margin-bottom:1rem;">
        <div style="font-weight:600;color:#185FA5;margin-bottom:.5rem;font-size:14px;">👤 Представьтесь перед началом теста</div>
        <input class="name-input" id="inp-name" type="text" placeholder="Имя Фамилия" autocomplete="name">
        <input class="name-input" id="inp-group" type="text" placeholder="Номер группы" autocomplete="off">
      </div>
    <div class="toggle-row">
      <label class="toggle-label">⏱ Таймер <span class="toggle-sub">20 секунд на вопрос</span></label>
      <label class="toggle-switch">
        <input type="checkbox" id="timer-toggle" onchange="onTimerToggle(this)">
        <span class="toggle-slider"></span>
      </label>
    </div>
<button style="padding:12px 40px;border-radius:10px;border:1.5px solid #378ADD;background:#378ADD;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;" onclick="tryStart()">▶ Начать тест</button>
  </div>

  <div id="quiz-screen" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <span class="timer-chip" id="timer-chip" style="display:none;float:right;background:#fee2e2;color:#b91c1c;border-radius:8px;padding:3px 10px;font-weight:700;font-size:13px;">⏱ 20</span>
  <div class="q-meta">
      <span class="q-counter" id="counter">Вопрос 1 из 10</span>
      <span class="q-tag" id="qtag">Grammar</span>
    </div>
    <div class="q-text" id="qtext"></div>
    <div id="answer-area"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Следующий →</button>
  </div>

  <div id="result-screen" style="display:none" class="result-card">
    <div class="result-emoji" id="res-emoji"></div>
    <div class="result-score" id="res-score"></div>
    <div class="result-label">правильных ответов из 10</div>
    <div class="result-msg" id="res-msg"></div>
    
      <div id="send-status" class="send-status"></div>
      <div id="timer-status"></div>
      <button class="restart-btn" onclick="restart()">Пройти ещё раз</button>
    <div class="mistakes-list" id="mistakes-block"></div>
  </div>
</div>

<script>
var ALL_QUESTIONS = [
  {
    type: "choice", tag: "Местоимение",
    q: "Выберите правильное местоимение:\nHow ___ times did you train?",
    opts: ["much", "many", "little", "few"],
    ans: 1, exp: "How many — с исчисляемыми существительными (times)"
  },
  {
    type: "choice", tag: "Предлог",
    q: "Выберите правильный предлог:\nMy pen is ___ the table.",
    opts: ["on", "for", "with", "about"],
    ans: 0, exp: "on the table — на столе"
  },
  {
    type: "choice", tag: "Предлог",
    q: "Выберите правильный предлог:\nNew Year is ___ the 31st of December.",
    opts: ["at", "on", "in", "into"],
    ans: 1, exp: "on + конкретная дата: on the 31st of December"
  },
  {
    type: "choice", tag: "Present Simple",
    q: "Выберите правильный вариант (Present Simple):\nWe sometimes ___ films.",
    opts: ["watch", "are watching", "watches", "watching"],
    ans: 0, exp: "We → без -s: watch. Present Simple для регулярных действий."
  },
  {
    type: "choice", tag: "Present Simple",
    q: "Выберите правильный вариант (Present Simple):\nIt ___ every day.",
    opts: ["raining", "is raining", "rains", "rain"],
    ans: 2, exp: "It (3-е лицо ед.ч.) → rains. Факт / регулярное действие = Present Simple."
  },
  {
    type: "choice", tag: "Present / Past Simple",
    q: "Выберите правильный вариант (Present/Past Simple):\nPeople ___ to travel.",
    opts: ["like", "are liking", "likes", "liked"],
    ans: 0, exp: "People (мн.ч.) → like. Глагол like не используется в Continuous."
  },
  {
    type: "choice", tag: "Present / Past Simple",
    q: "Выберите правильный вариант (Present/Past Simple):\nMike never ___ to music.",
    opts: ["is listening", "listen", "listens", "was listening"],
    ans: 2, exp: "Mike (он) + never → Present Simple: listens"
  },
  {
    type: "choice", tag: "Past Simple",
    q: "Выберите правильный вариант (Past Simple):\nYou ___ yesterday.",
    opts: ["rang", "ranged", "ring", "rings"],
    ans: 0, exp: "ring → rang (неправильный глагол, Past Simple)"
  },
  {
    type: "choice", tag: "Present Simple",
    q: "Выберите правильный вариант (Present Simple):\nWhere ___ you (to live)?",
    opts: ["does … live", "are … living", "is … living", "do … live"],
    ans: 3, exp: "Where do you live? — Present Simple, вопрос о постоянном месте жительства"
  },
  {
    type: "choice", tag: "Степени сравнения",
    q: "Выберите правильный вариант степени сравнения:\nToday the weather seems ___ (good) than yesterday.",
    opts: ["gooder", "better", "best", "the best"],
    ans: 1, exp: "good → better (сравнительная степень, исключение)"
  },
  {
    type: "choice", tag: "Степени сравнения",
    q: "Выберите правильный вариант степени сравнения:\nMary is ___ (quick) in the team.",
    opts: ["quicker", "quickest", "the quickest", "more quicker"],
    ans: 2, exp: "Превосходная степень: the quickest (короткое прилагательное)"
  },
  {
    type: "choice", tag: "Степени сравнения",
    q: "Выберите правильный вариант степени сравнения:\nWho are ___ football players in this chart?",
    opts: ["famous", "more famous", "famouser", "the most famous"],
    ans: 3, exp: "Превосходная степень длинного прилагательного: the most famous"
  },
  {
    type: "choice", tag: "Степени сравнения",
    q: "Выберите правильный вариант степени сравнения:\nThis road is as ___ as that one.",
    opts: ["dangerouser", "more dangerous", "dangerous", "the most dangerous"],
    ans: 2, exp: "as … as → основная форма прилагательного: as dangerous as"
  },
  {
    type: "choice", tag: "Present Continuous",
    q: "Выберите правильный вариант (Present Continuous):\nThe students ___ lunch now.",
    opts: ["is having", "will have", "having", "are having"],
    ans: 3, exp: "The students (мн.ч.) → are having. Present Continuous для действия сейчас."
  },
  {
    type: "choice", tag: "Future Simple",
    q: "Выберите правильный вариант (Future Simple):\nTomorrow Alex ___ to his friends.",
    opts: ["is gone", "will be going", "will go", "go"],
    ans: 2, exp: "Future Simple: will + инфинитив: will go"
  },
  {
    type: "choice", tag: "There is / There are",
    q: "Выберите правильную форму (there is/there are, Present Simple):\nThere ___ a sofa and two armchairs in the room.",
    opts: ["are", "was", "were", "is"],
    ans: 3, exp: "Подлежащее — a sofa (ед.ч.), поэтому: There is"
  },
  {
    type: "choice", tag: "There is / There are",
    q: "Выберите правильную форму и наречие (Present Simple):\n___ there ___ mistakes in your test?",
    opts: ["Is, any", "Is, some", "Are, any", "Are, some"],
    ans: 2, exp: "mistakes — мн.ч. → Are there any (в вопросах — any)"
  },
  {
    type: "choice", tag: "There is / There are",
    q: "Выберите правильную форму и наречие (Present Simple):\n___ there ___ information in the news?",
    opts: ["Is … any", "Is … some", "Are … any", "Are … some"],
    ans: 0, exp: "information — неисчисляемое → Is there any information?"
  },
  {
    type: "choice", tag: "Артикль",
    q: "Выберите правильный артикль:\nI like ___ Ob.",
    opts: ["a", "the", "—", "an"],
    ans: 1, exp: "Реки употребляются с артиклем the: the Ob (река Обь)"
  },
  {
    type: "choice", tag: "Артикль",
    q: "Выберите правильный артикль:\n___ Pacific Ocean is the house for many ___ islands.",
    opts: ["A, the", "The, —", "—, the", "The, the"],
    ans: 1, exp: "The Pacific Ocean (океан → the). many islands — мн.ч. нарицательное без артикля."
  },
  {
    type: "open", tag: "Порядок слов",
    q: "Составьте предложение, поставьте глагол в нужную форму:\nat / Tom / college / next year / (to study)",
    ans: ["Tom will study at college next year.", "Next year Tom will study at college."],
    exp: "Tom will study at college next year."
  },
  {
    type: "open", tag: "Порядок слов",
    q: "Составьте предложение, поставьте глагол в нужную форму:\nmy friends / last month / (to swim)",
    ans: ["My friends swam last month."],
    exp: "My friends swam last month. (swim → swam, Past Simple)"
  },
  {
    type: "open", tag: "Порядок слов",
    q: "Составьте предложение, поставьте глагол в нужную форму:\nat 20:00 / (be over) / the film / tomorrow",
    ans: ["The film will be over at 20:00 tomorrow.", "Tomorrow the film will be over at 20:00."],
    exp: "The film will be over at 20:00 tomorrow."
  },
  {
    type: "open", tag: "Порядок слов",
    q: "Составьте предложение, поставьте глагол в нужную форму:\nnow / shopping / Mary / (to go)",
    ans: ["Mary is going shopping now."],
    exp: "Mary is going shopping now. (Present Continuous)"
  },
  {
    type: "open", tag: "Порядок слов",
    q: "Составьте предложение, поставьте глагол в нужную форму:\nevery day / the bus / (to come)",
    ans: ["The bus comes every day."],
    exp: "The bus comes every day. (Present Simple, 3-е лицо ед.ч.)"
  }
];

var TOTAL = 10;
var questions = [], cur = 0, score = 0, mistakes = [];

function shuffle(arr) { return arr.slice().sort(function() { return Math.random() - 0.5; }); }

function initQuiz() {
  questions = shuffle(ALL_QUESTIONS).slice(0, TOTAL);
  cur = 0; score = 0; mistakes = [];
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  var q = questions[cur];
  document.getElementById('counter').textContent = 'Вопрос ' + (cur + 1) + ' из ' + TOTAL;
  document.getElementById('progress').style.width = (cur / TOTAL * 100) + '%';
  document.getElementById('qtag').textContent = q.tag;

  var qEl = document.getElementById('qtext');
  var lines = q.q.split('\n');
  var html = '';
  lines.forEach(function(line, i) {
    if (i === 0) html += '<span style="font-size:13px;color:#5b8dc7;font-weight:400;">' + line + '</span><br>';
    else html += line.replace(/___/g, '<code>___</code>');
  });
  qEl.innerHTML = html;

  var area = document.getElementById('answer-area');
  area.innerHTML = '';

  if (q.type === 'choice') {
    var div = document.createElement('div');
    div.className = 'options';
    q.opts.forEach(function(opt, i) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = (i + 1) + ')  ' + opt;
      btn.onclick = (function(idx) { return function() { selectChoice(idx); }; })(i);
      div.appendChild(btn);
    });
    area.appendChild(div);
  } else {
    var wrap = document.createElement('div');
    wrap.className = 'open-wrap';
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'open-input';
    inp.id = 'open-input';
    inp.placeholder = 'Напишите предложение...';
    inp.onkeydown = function(e) { if (e.key === 'Enter') checkOpen(); };
    var btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.id = 'check-btn';
    btn.textContent = 'Проверить';
    btn.onclick = checkOpen;
    wrap.appendChild(inp);
    wrap.appendChild(btn);
    area.appendChild(wrap);
    setTimeout(function() { inp.focus(); }, 50);
  }

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').style.display = 'none';
}

function selectChoice(idx) {
  var q = questions[cur];
  var btns = document.querySelectorAll('.opt-btn');
  btns.forEach(function(b) { b.disabled = true; });
  var fb = document.getElementById('feedback');
  if (idx === q.ans) {
    btns[idx].classList.add('correct');
    fb.textContent = '✓ Правильно! ' + q.exp;
    fb.className = 'feedback ok';
    score++;
    launchConfetti();
  } else {
    btns[idx].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    fb.textContent = '✗ Неверно. ' + q.exp;
    fb.className = 'feedback err';
    mistakes.push({ q: q.q.split('\n').slice(-1)[0], ans: q.opts[q.ans] });
  }
  showNext();
}

function normalize(s) {
  return s.trim().toLowerCase().replace(/[.,!?]/g, '').replace(/\s+/g, ' ');
}

function checkOpen() {
  var q = questions[cur];
  var inp = document.getElementById('open-input');
  var val = inp.value;
  if (!val.trim()) return;
  inp.disabled = true;
  document.getElementById('check-btn').disabled = true;
  var fb = document.getElementById('feedback');
  var correct = false;
  for (var i = 0; i < q.ans.length; i++) {
    if (normalize(val) === normalize(q.ans[i])) { correct = true; break; }
  }
  if (correct) {
    inp.classList.add('correct');
    fb.textContent = '✓ Правильно!';
    fb.className = 'feedback ok';
    score++;
    launchConfetti();
  } else {
    inp.classList.add('wrong');
    fb.innerHTML = '✗ Неверно. Правильный ответ: <strong>' + q.exp + '</strong>';
    fb.className = 'feedback err';
    mistakes.push({ q: q.q.split('\n').slice(-1)[0], ans: q.exp });
  }
  showNext();
}

function showNext() {
  var nextBtn = document.getElementById('nextBtn');
  nextBtn.style.display = 'inline-block';
  nextBtn.textContent = cur < TOTAL - 1 ? 'Следующий →' : 'Посмотреть результат →';
}

function nextQuestion() {
  cur++;
  if (cur < TOTAL) showQuestion(); else showResult();
}

function showResult() {
  // Send to Google Forms
  var _name = (document.getElementById('inp-name') ? document.getElementById('inp-name').value.trim() : '') || 'Аноним';
  var _group = (document.getElementById('inp-group') ? document.getElementById('inp-group').value.trim() : '') || '—';
  var _result = score + '/' + TOTAL;
  var _xp = 0;
  sendToGoogleForms(_name, _group, 'Зачёт-10', _result, _xp, false);

  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('progress').style.width = '100%';
  document.getElementById('res-score').textContent = score + ' / ' + TOTAL;
  var pct = score / TOTAL;
  var emoji, msg;
  if (pct === 1) {
    emoji = '🏆'; msg = 'Отлично! Все 10 вопросов верно. Вы готовы к зачёту!';
    launchBigConfetti();
  } else if (pct >= 0.8) {
    emoji = '⭐'; msg = 'Очень хорошо! Разберите ошибки ниже и вы готовы к зачёту.';
  } else if (pct >= 0.6) {
    emoji = '👍'; msg = 'Неплохо, но есть пробелы. Повторите темы из ошибок и попробуйте снова.';
  } else {
    emoji = '📖'; msg = 'Нужно ещё поработать. Повторите грамматические темы и попробуйте ещё раз!';
  }
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-msg').textContent = msg;
  var mBlock = document.getElementById('mistakes-block');
  if (mistakes.length > 0) {
    var html = '<h3>Разбор ошибок:</h3>';
    mistakes.forEach(function(m) {
      html += '<div class="mistake-item"><div class="m-q">' + m.q + '</div><div class="m-a">✓ ' + m.ans + '</div></div>';
    });
    mBlock.innerHTML = html;
  } else { mBlock.innerHTML = ''; }
}

function restart() {
  document.getElementById('start-screen').style.display='';
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
}

// CONFETTI
var canvas = document.getElementById('confetti-canvas');
var ctx = canvas.getContext('2d');
var particles = [], animId = null;
var COLORS = ['#378ADD','#22c55e','#f59e0b','#ef4444','#a855f7','#ec4899','#14b8a6'];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function createParticle(x, y, big) {
  var angle = Math.random() * Math.PI * 2;
  var speed = big ? (Math.random() * 10 + 5) : (Math.random() * 7 + 3);
  return {
    x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - (big ? 8 : 4),
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    size: big ? (Math.random() * 10 + 5) : (Math.random() * 7 + 3),
    rotation: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 8,
    alpha: 1, shape: Math.random() > 0.5 ? 'rect' : 'circle'
  };
}

function spawnBurst(x, y, count, big) {
  for (var i = 0; i < count; i++) particles.push(createParticle(x, y, big));
}

function launchConfetti() {
  var rect = document.querySelector('.card').getBoundingClientRect();
  spawnBurst(rect.left + rect.width / 2, rect.top + rect.height * 0.3, 50, false);
  if (!animId) animate();
}

function launchBigConfetti() {
  var cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  spawnBurst(cx, cy, 130, true);
  setTimeout(function() { spawnBurst(cx - 220, cy, 70, true); }, 200);
  setTimeout(function() { spawnBurst(cx + 220, cy, 70, true); }, 400);
  if (!animId) animate();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(function(p) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.vx *= 0.99;
    p.rotation += p.rotSpeed; p.alpha -= 0.016;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation * Math.PI / 180);
    ctx.fillStyle = p.color;
    if (p.shape === 'rect') { ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2); }
    else { ctx.beginPath(); ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2); ctx.fill(); }
    ctx.restore();
  });
  particles = particles.filter(function(p) { return p.alpha > 0; });
  if (particles.length > 0) { animId = requestAnimationFrame(animate); }
  else { animId = null; ctx.clearRect(0, 0, canvas.width, canvas.height); }
}


function tryStart(){
  var ne=document.getElementById('inp-name'), ge=document.getElementById('inp-group');
  if(!ne.value.trim()){ne.classList.add('err');ne.focus();return;}
  if(!ge.value.trim()){ge.classList.add('err');ge.focus();return;}
  ne.classList.remove('err'); ge.classList.remove('err');
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  initQuiz();
}



var timerEnabled = false, timerInterval = null, timerSec = 20;
function onTimerToggle(el){ timerEnabled = el.checked; }
function startTimer(){
  timerSec = 20;
  var chip = document.getElementById('timer-chip');
  if(chip){ chip.textContent='⏱ '+timerSec; chip.style.display=''; }
  timerInterval = setInterval(function(){
    timerSec--;
    if(chip) chip.textContent='⏱ '+timerSec;
    if(timerSec<=0){ clearInterval(timerInterval); timeOut(); }
  }, 1000);
}
function stopTimer(){ clearInterval(timerInterval); }
function timeOut(){
  var q = questions[cur];
  var fb = document.getElementById('feedback');
  if(fb){ fb.className='feedback err'; fb.textContent='⏱ Время вышло! Правильно: '+(q.ans !== undefined ? (q.opts ? q.opts[q.ans] : q.plural||q.answer||'') : ''); }
  mistakes.push(q);
  results.push({ok:false, q:q});
  document.getElementById('next-btn').style.display='inline-block';
}

function sendToGoogleForms(name, group, testName, result, xpEarned, timerOn) {
  var formUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSdfme_aKvoexXRSz7LTn5dxgY_7P2lBJsokU3puqehRxZVslw/formResponse';
  var body = new FormData();
  body.append('entry.1795360459', name);
  body.append('entry.1572037373', group);
  body.append('entry.1562414669', testName);
  body.append('entry.994594767', result + (timerOn ? ' | ⏱ Таймер: ВКЛ' : ' | ⏱ Таймер: ВЫКЛ'));
  body.append('entry.1290836239', xpEarned);
  fetch(formUrl, {method:'POST', body:body, mode:'no-cors'})
  .then(function(){
    var el=document.getElementById('send-status');
    if(el){el.textContent='✅ Результат отправлен преподавателю'; el.className='send-status ok';}
    var tel=document.getElementById('timer-status');
    if(tel){tel.textContent=timerOn?'⏱ Таймер: включён':'⏱ Таймер: выключен'; tel.className=timerOn?'timer-on':'timer-off';}
  }).catch(function(){
    var el=document.getElementById('send-status');
    if(el){el.textContent='⚠️ Нет соединения — результат не отправлен'; el.className='send-status err';}
    var tel=document.getElementById('timer-status');
    if(tel){tel.textContent=timerOn?'⏱ Таймер: включён':'⏱ Таймер: выключен'; tel.className=timerOn?'timer-on':'timer-off';}
  });
}
