rder-color 0.12s;\n  }\n  .play-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }\n  .line.playing .play-btn { background: var(--accent); color: #fff; border-color: var(--accent); animation: pulse 1s ease infinite; }\n  @keyframes pulse {\n    0%, 100% { box-shadow: 0 0 0 0 rgba(124,92,252,0.5); }\n    50%       { box-shadow: 0 0 0 6px rgba(124,92,252,0); }\n  }\n\n  \u002f* ── PAGE TABS ── *\u002f\n  .page-tabs {\n    max-width: 700px;\n    margin: 0 auto 0;\n    padding: 0 1.5rem;\n    display: flex;\n    gap: 0;\n    border-bottom: 2px solid var(--border);\n  }\n  .page-tab {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 500;\n    background: none;\n    border: none;\n    color: var(--muted);\n    padding: 10px 20px;\n    cursor: pointer;\n    border-bottom: 2px solid transparent;\n    margin-bottom: -2px;\n    transition: color 0.15s, border-color 0.15s;\n  }\n  .page-tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }\n  .page-tab:hover:not(.active) { color: var(--text); }\n  .tab-panel { display: none; }\n  .tab-panel.active { display: block; }\n\n  \u002f* ── GRAMMAR EXERCISE ── *\u002f\n  .ex-wrap {\n    max-width: 700px;\n    margin: 0 auto;\n    padding: 1.5rem 1.5rem 0;\n  }\n  .ex-header {\n    margin-bottom: 1.2rem;\n  }\n  .ex-header h2 {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 1rem;\n    font-weight: 700;\n    margin-bottom: 0.3rem;\n  }\n  .ex-header p { font-size: 0.82rem; color: var(--muted); }\n\n  .ex-tabs {\n    display: flex;\n    gap: 8px;\n    flex-wrap: wrap;\n    margin-bottom: 1.2rem;\n  }\n  .ex-tab {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.78rem;\n    font-weight: 500;\n    padding: 6px 14px;\n    border-radius: 100px;\n    border: 1px solid var(--border);\n    background: var(--card);\n    color: var(--muted);\n    cursor: pointer;\n    transition: all 0.15s;\n  }\n  .ex-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }\n  .ex-tab:hover:not(.active) { color: var(--text); border-color: var(--muted); }\n\n  .ex-panel { display: none; }\n  .ex-panel.active { display: block; }\n\n  \u002f* Fill in the blank *\u002f\n  .fill-list { display: flex; flex-direction: column; gap: 10px; }\n  .fill-item {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 14px 16px;\n    transition: border-color 0.2s;\n  }\n  .fill-item.correct { border-color: var(--green); background: #0d1f16; }\n  .fill-item.wrong   { border-color: #f87171; background: #1f0d0d; }\n  .fill-context {\n    font-size: 0.78rem;\n    color: var(--muted);\n    margin-bottom: 6px;\n  }\n  .fill-sentence {\n    font-size: 0.92rem;\n    font-weight: 500;\n    line-height: 1.6;\n    display: flex;\n    align-items: center;\n    flex-wrap: wrap;\n    gap: 4px;\n  }\n  .fill-input {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.9rem;\n    font-weight: 600;\n    background: var(--card2);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    color: var(--text);\n    padding: 3px 10px;\n    min-width: 100px;\n    outline: none;\n    transition: border-color 0.15s;\n    text-align: center;\n  }\n  .fill-input:focus { border-color: var(--accent); }\n  .fill-input.correct { border-color: var(--green); color: var(--green); background: #0d1f16; }\n  .fill-input.wrong   { border-color: #f87171; color: #f87171; background: #1f0d0d; }\n  .fill-feedback {\n    font-size: 0.78rem;\n    margin-top: 6px;\n    min-height: 1.2em;\n    display: none;\n  }\n  .fill-feedback.show { display: block; }\n  .fill-feedback.ok { color: var(--green); }\n  .fill-feedback.no { color: #f87171; }\n\n  \u002f* MCQ *\u002f\n  .mcq-list { display: flex; flex-direction: column; gap: 12px; }\n  .mcq-item {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 14px 16px;\n  }\n  .mcq-item.correct { border-color: var(--green); background: #0d1f16; }\n  .mcq-item.wrong   { border-color: #f87171; background: #1f0d0d; }\n  .mcq-q {\n    font-size: 0.92rem;\n    font-weight: 500;\n    margin-bottom: 10px;\n    line-height: 1.5;\n  }\n  .mcq-context { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }\n  .mcq-opts { display: flex; gap: 8px; flex-wrap: wrap; }\n  .mcq-opt {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 500;\n    padding: 7px 16px;\n    border-radius: 10px;\n    border: 1px solid var(--border);\n    background: var(--card2);\n    color: var(--text);\n    cursor: pointer;\n    transition: all 0.12s;\n  }\n  .mcq-opt:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }\n  .mcq-opt:disabled { cursor: default; }\n  .mcq-opt.correct { background: #0d1f16; border-color: var(--green); color: var(--green); }\n  .mcq-opt.wrong   { background: #1f0d0d; border-color: #f87171; color: #f87171; }\n  .mcq-feedback { font-size: 0.78rem; margin-top: 8px; min-height: 1.1em; }\n  .mcq-feedback.ok { color: var(--green); }\n  .mcq-feedback.no { color: #f87171; }\n\n  \u002f* Verb finder *\u002f\n  .vf-instruction { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; line-height: 1.5; }\n  .vf-lines { display: flex; flex-direction: column; gap: 8px; }\n  .vf-line {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 12px 16px;\n  }\n  .vf-speaker { font-size: 0.7rem; font-family: 'Unbounded', sans-serif; color: var(--muted); margin-bottom: 4px; }\n  .vf-text { font-size: 0.92rem; font-weight: 500; line-height: 1.6; }\n  .vf-word {\n    cursor: pointer;\n    border-radius: 4px;\n    padding: 1px 3px;\n    transition: background 0.12s;\n    display: inline-block;\n  }\n  .vf-word:hover { background: var(--card2); }\n  .vf-word.selected-ok { background: #0d1f16; color: var(--green); border-radius: 6px; }\n  .vf-word.selected-no { background: #1f0d0d; color: #f87171; border-radius: 6px; }\n  .vf-result { font-size: 0.78rem; margin-top: 8px; color: var(--muted); }\n\n  \u002f* Score bar *\u002f\n  .score-bar {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 14px 18px;\n    margin-bottom: 1.2rem;\n    display: flex;\n    align-items: center;\n    gap: 14px;\n  }\n  .score-num { font-family: 'Unbounded', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--accent); }\n  .score-label { font-size: 0.8rem; color: var(--muted); }\n  .score-stars { font-size: 1.1rem; margin-left: auto; }\n\n  .ex-check-btn {\n    margin-top: 1rem;\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 600;\n    padding: 10px 22px;\n    border-radius: 10px;\n    border: none;\n    background: var(--accent);\n    color: #fff;\n    cursor: pointer;\n    transition: opacity 0.1s, transform 0.1s;\n  }\n  .ex-check-btn:active { transform: scale(0.96); }\n  .ex-reset-btn {\n    margin-top: 0.5rem;\n    margin-left: 8px;\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 500;\n    padding: 10px 18px;\n    border-radius: 10px;\n    border: 1px solid var(--border);\n    background: var(--card2);\n    color: var(--muted);\n    cursor: pointer;\n  }\n\n  \u002f* ── NOTICE ── *\u002f\n  .notice {\n    max-width: 700px;\n    margin: 1.5rem auto 0;\n    padding: 0 1.5rem;\n  }\n  .notice-inner {\n    background: #1a1520;\n    border: 1px solid #2a2040;\n    border-radius: 12px;\n    padding: 12px 16px;\n    font-size: 0.78rem;\n    color: var(--muted);\n    display: flex;\n    gap: 10px;\n    align-items: flex-start;\n  }\n  .notice-inner .ico { font-size: 1rem; flex-shrink: 0; }\n\n  \u002f* ── STATUS ── *\u002f\n  .status {\n    max-width: 700px;\n    margin: 0.75rem auto 0;\n    padding: 0 1.5rem;\n    font-size: 0.75rem;\n    color: var(--muted);\n    min-height: 1.2em;\n  }\n\u003c\u002fstyle\u003e\n\u003c\u002fhead\u003e\n\u003cbody\u003e\n\n\u003cheader\u003e\n  \u003cdiv class=\"header-tag\"\u003eFuture Simple Tense · Диалог Alex & Mary\u003c\u002fdiv\u003e\n  \u003ch1\u003eАудио + Грамматика\u003c\u002fh1\u003e\n  \u003cp\u003eДва режима: слушайте диалог или выполните грамматическое упражнение.\u003c\u002fp\u003e\n\u003c\u002fheader\u003e\n\n\u003c!-- Page Tabs --\u003e\n\u003cdiv class=\"page-tabs\"\u003e\n  \u003cbutton class=\"page-tab active\" onclick=\"switchPageTab('audio')\"\u003e🔊 Диалог\u003c\u002fbutton\u003e\n  \u003cbutton class=\"page-tab\" onclick=\"switchPageTab('grammar')\"\u003e✏️ Грамматика\u003c\u002fbutton\u003e\n\u003c\u002fdiv\u003e\n\n\u003c!-- ═══ TAB: AUDIO ═══ --\u003e\n\u003cdiv class=\"tab-panel active\" id=\"ptab-audio\"\u003e\n\n\u003cdiv class=\"controls\"\u003e\n  \u003cbutton class=\"btn btn-play-all\" id=\"btn-play-all\" onclick=\"playAll()\"\u003e▶ Слушать весь диалог\u003c\u002fbutton\u003e\n  \u003cbutton class=\"btn btn-stop\" id=\"btn-stop\" onclick=\"stopAll()\" disabled\u003e■ Стоп\u003c\u002fbutton\u003e\n  \u003cdiv class=\"speed-wrap\"\u003e\n    🐢\n    \u003cinput type=\"range\" id=\"speed\" min=\"0.6\" max=\"1.3\" step=\"0.1\" value=\"0.9\" oninput=\"updateSpeed(this.value)\"\u003e\n    🐇\n    \u003cspan id=\"speed-val\"\u003e0.9×\u003c\u002fspan\u003e\n  \u003c\u002fdiv\u003e\n  \u003cbutton class=\"btn btn-reveal\" id=\"btn-reveal\" onclick=\"toggleReveal()\"\u003e👁 Скрыть перевод\u003c\u002fbutton\u003e\n\u003c\u002fdiv\u003e\n\n\u003cdiv class=\"progress-wrap\"\u003e\n  \u003cdiv class=\"progress-track\"\u003e\u003cdiv class=\"progress-fill\" id=\"progress-fill\"\u003e\u003c\u002fdiv\u003e\u003c\u002fdiv\u003e\n\u003c\u002fdiv\u003e\n\u003cdiv class=\"status\" id=\"status\"\u003e\u003c\u002fdiv\u003e\n\n\u003cdiv class=\"dialogue\" id=\"dialogue\"\u003e\u003c\u002fdiv\u003e\n\n\u003cdiv class=\"notice\"\u003e\n  \u003cdiv class=\"notice-inner\"\u003e\n    \u003cspan class=\"ico\"\u003e💬\u003c\u002fspan\u003e\n    \u003cspan\u003eОзвучивание работает через Web Speech API — встроенный синтез речи браузера. Лучшее качество в \u003cb\u003eGoogle Chrome\u003c\u002fb\u003e. Если звука нет — проверьте, что браузер не заглушён.\u003c\u002fspan\u003e\n  \u003c\u002fdiv\u003e\n\u003c\u002fdiv\u003e\n\n\u003c\u002fdiv\u003e\u003c!-- \u002fptab-audio --\u003e\n\n\u003c!-- ═══ TAB: GRAMMAR ═══ --\u003e\n\u003cdiv class=\"tab-panel\" id=\"ptab-grammar\"\u003e\n\u003cdiv class=\"ex-wrap\"\u003e\n\n  \u003cdiv class=\"ex-header\"\u003e\n    \u003ch2\u003eГрамматические упражнения\u003c\u002fh2\u003e\n    \u003cp\u003eТри типа заданий на основе диалога. Выберите упражнение:\u003c\u002fp\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003cdiv class=\"ex-tabs\"\u003e\n    \u003cbutton class=\"ex-tab active\" onclick=\"switchExTab('fill')\"\u003e1 · Вставьте слово\u003c\u002fbutton\u003e\n    \u003cbutton class=\"ex-tab\" onclick=\"switchExTab('mcq')\"\u003e2 · Выберите форму\u003c\u002fbutton\u003e\n    \u003cbutton class=\"ex-tab\" onclick=\"switchExTab('vf')\"\u003e3 · Найдите глаголы\u003c\u002fbutton\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003c!-- ── EX 1: Fill in the blank ── --\u003e\n  \u003cdiv class=\"ex-panel active\" id=\"ex-fill\"\u003e\n    \u003cdiv class=\"score-bar\" id=\"fill-score-bar\" style=\"display:none\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv class=\"score-num\" id=\"fill-score-num\"\u003e0\u002f8\u003c\u002fdiv\u003e\n        \u003cdiv class=\"score-label\"\u003eправильных ответов\u003c\u002fdiv\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"score-stars\" id=\"fill-score-stars\"\u003e\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"fill-list\" id=\"fill-list\"\u003e\u003c\u002fdiv\u003e\n    \u003cdiv\u003e\n      \u003cbutton class=\"ex-check-btn\" onclick=\"checkFill()\"\u003eПроверить\u003c\u002fbutton\u003e\n      \u003cbutton class=\"ex-reset-btn\" onclick=\"resetFill()\"\u003eСбросить\u003c\u002fbutton\u003e\n    \u003c\u002fdiv\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003c!-- ── EX 2: MCQ ── --\u003e\n  \u003cdiv class=\"ex-panel\" id=\"ex-mcq\"\u003e\n    \u003cdiv class=\"score-bar\" id=\"mcq-score-bar\" style=\"display:none\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv class=\"score-num\" id=\"mcq-score-num\"\u003e0\u002f7\u003c\u002fdiv\u003e\n        \u003cdiv class=\"score-label\"\u003eправильных ответов\u003c\u002fdiv\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"score-stars\" id=\"mcq-score-stars\"\u003e\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"mcq-list\" id=\"mcq-list\"\u003e\u003c\u002fdiv\u003e\n    \u003cdiv style=\"margin-top:1rem;\"\u003e\n      \u003cbutton class=\"ex-reset-btn\" onclick=\"resetMcq()\"\u003eСбросить\u003c\u002fbutton\u003e\n    \u003c\u002fdiv\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003c!-- ── EX 3: Verb finder ── --\u003e\n  \u003cdiv class=\"ex-panel\" id=\"ex-vf\"\u003e\n    \u003cdiv class=\"vf-instruction\"\u003e\n      Нажимайте на слово \u003cb\u003ewill\u003c\u002fb\u003e везде, где оно используется как вспомогательный глагол Future Simple. Нажмите ещё раз — снять выбор.\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"score-bar\" id=\"vf-score-bar\" style=\"display:none\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv class=\"score-num\" id=\"vf-score-num\"\u003e0\u002f8\u003c\u002fdiv\u003e\n        \u003cdiv class=\"score-label\"\u003eглаголов найдено\u003c\u002fdiv\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"score-stars\" id=\"vf-score-stars\"\u003e\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"vf-lines\" id=\"vf-lines\"\u003e\u003c\u002fdiv\u003e\n    \u003cdiv style=\"margin-top:1rem;\"\u003e\n      \u003cbutton class=\"ex-check-btn\" onclick=\"checkVF()\"\u003eПроверить\u003c\u002fbutton\u003e\n      \u003cbutton class=\"ex-reset-btn\" onclick=\"resetVF()\"\u003eСбросить\u003c\u002fbutton\u003e\n    \u003c\u002fdiv\u003e\n  \u003c\u002fdiv\u003e\n\n\u003c\u002fdiv\u003e\n\u003c\u002fdiv\u003e\u003c!-- \u002fptab-grammar --\u003e\n\n\u003cscript\u003e\nconst LINES = [\n  { speaker:'Alex', ru:'Привет! Ты будешь работать в понедельник?',                          en:'Hi! Will you work on Monday?' },\n  { speaker:'Mary', ru:'Да. Я буду работать после обеда.',                                    en:'Yes, I will. I will work after lunch.' },\n  { speaker:'Alex', ru:'Что ты будешь делать после работы?',                                  en:'What will you do after work?' },\n  { speaker:'Mary', ru:'Я буду тренироваться. Ты любишь спорт?',                              en:'I will train. Do you like sport?' },\n  { speaker:'Alex', ru:'Да. Я буду тренироваться на следующей неделе каждый день. Где ты будешь тренироваться?', en:'Yes, I do. I will train next week every day. Where will you train?' },\n  { speaker:'Mary', ru:'Я буду тренироваться в фитнес клубе.',                                en:'I will train in the fitness club.' },\n  { speaker:'Alex', ru:'У тебя много друзей?',                                                 en:'Do you have many friends?' },\n  { speaker:'Mary', ru:'Да. Мы встретимся в воскресенье. Ты любишь читать?',                  en:'Yes, I do. We will meet on Sunday. Do you like to read?' },\n  { speaker:'Alex', ru:'Да. Через два дня я прочитаю интересную книгу.',                      en:'Yes, I do. I will read an interesting book in two days.' },\n  { speaker:'Mary', ru:'Спасибо за звонок.',                                                   en:'Thank you for calling.' },\n  { speaker:'Alex', ru:'Хорошего дня.',                                                        en:'Have a nice day.' },\n];\n\nlet currentIdx = -1;\nlet isPlayingAll = false;\nlet speechRate = 0.9;\nlet revealed = true;\n\n\u002f\u002f Build UI\nconst dlg = document.getElementById('dialogue');\nLINES.forEach((l, i) =\u003e {\n  const sp = l.speaker.toLowerCase();\n  const div = document.createElement('div');\n  div.className = `line ${sp}`;\n  div.id = `line-${i}`;\n  div.onclick = () =\u003e playSingle(i);\n  div.innerHTML = `\n    \u003cspan class=\"line-num\"\u003e${i+1}\u003c\u002fspan\u003e\n    \u003cdiv class=\"speaker-icon\"\u003e${l.speaker.substring(0,2).toUpperCase()}\u003c\u002fdiv\u003e\n    \u003cdiv class=\"line-body\"\u003e\n      \u003cdiv class=\"line-ru\"\u003e${l.ru}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"line-en\" id=\"en-${i}\"\u003e${l.en}\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cbutton class=\"play-btn\" onclick=\"event.stopPropagation();playSingle(${i})\"\u003e▶\u003c\u002fbutton\u003e\n  `;\n  dlg.appendChild(div);\n});\n\nfunction updateSpeed(v){\n  speechRate = parseFloat(v);\n  document.getElementById('speed-val').textContent = v + '×';\n}\n\nfunction setStatus(txt){ document.getElementById('status').textContent = txt; }\n\nfunction setProgress(i){\n  const pct = LINES.length ? ((i+1)\u002fLINES.length*100) : 0;\n  document.getElementById('progress-fill').style.width = pct + '%';\n}\n\nfunction clearHighlight(){\n  document.querySelectorAll('.line').forEach(l=\u003el.classList.remove('playing'));\n}\n\nfunction highlight(i){\n  clearHighlight();\n  const el = document.getElementById(`line-${i}`);\n  if(el){\n    el.classList.add('playing');\n    el.scrollIntoView({behavior:'smooth', block:'nearest'});\n  }\n  setProgress(i);\n}\n\nfunction speak(text, rate){\n  return new Promise((resolve) =\u003e {\n    window.speechSynthesis.cancel();\n    const u = new SpeechSynthesisUtterance(text);\n    u.lang = 'en-GB';\n    u.rate = rate || speechRate;\n    \u002f\u002f Try to pick an English voice\n    const voices = window.speechSynthesis.getVoices();\n    const en = voices.find(v=\u003ev.lang.startsWith('en-') && v.name.toLowerCase().includes('female'))\n            || voices.find(v=\u003ev.lang.startsWith('en-'))\n            || null;\n    if(en) u.voice = en;\n    u.onend = resolve;\n    u.onerror = resolve;\n    window.speechSynthesis.speak(u);\n  });\n}\n\nasync function playSingle(i){\n  stopAll();\n  currentIdx = i;\n  highlight(i);\n  setStatus(`Воспроизведение: строка ${i+1} — ${LINES[i].speaker}`);\n  await speak(LINES[i].en);\n  clearHighlight();\n  setStatus('');\n  currentIdx = -1;\n}\n\nasync function playAll(){\n  stopAll();\n  isPlayingAll = true;\n  document.getElementById('btn-play-all').disabled = true;\n  document.getElementById('btn-stop').disabled = false;\n  document.getElementById('progress-fill').style.width = '0%';\n\n  for(let i = 0; i \u003c LINES.length; i++){\n    if(!isPlayingAll) break;\n    currentIdx = i;\n    highlight(i);\n    setStatus(`▶ ${i+1} \u002f ${LINES.length} — ${LINES[i].speaker}: «${LINES[i].en}»`);\n    await speak(LINES[i].en);\n    \u002f\u002f small pause between lines\n    if(isPlayingAll) await new Promise(r=\u003esetTimeout(r, 600));\n  }\n\n  clearHighlight();\n  setStatus(isPlayingAll ? '✅ Диалог завершён' : '');\n  document.getElementById('progress-fill').style.width = isPlayingAll ? '100%' : '0%';\n  document.getElementById('btn-play-all').disabled = false;\n  document.getElementById('btn-stop').disabled = true;\n  isPlayingAll = false;\n  currentIdx = -1;\n}\n\nfunction stopAll(){\n  isPlayingAll = false;\n  window.speechSynthesis.cancel();\n  clearHighlight();\n  setStatus('');\n  document.getElementById('btn-play-all').disabled = false;\n  document.getElementById('btn-stop').disabled = true;\n  currentIdx = -1;\n}\n\nfunction toggleReveal(){\n  revealed = !revealed;\n  const btn = document.getElementById('btn-reveal');\n  document.querySelectorAll('.line-en').forEach(el=\u003e{\n    el.classList.toggle('hidden', !revealed);\n  });\n  btn.textContent = revealed ? '👁 Скрыть перевод' : '👁 Показать перевод';\n}\n\n\u002f\u002f Load voices (Chrome needs this trigger)\nwindow.speechSynthesis.onvoiceschanged = () =\u003e { window.speechSynthesis.getVoices(); };\nwindow.speechSynthesis.getVoices();\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f PAGE TABS\n\u002f\u002f ══════════════════════════════════════════\nfunction switchPageTab(name){\n  document.querySelectorAll('.page-tab').forEach(t=\u003et.classList.remove('active'));\n  document.querySelectorAll('.tab-panel').forEach(p=\u003ep.classList.remove('active'));\n  document.getElementById('ptab-'+name).classList.add('active');\n  document.querySelectorAll('.page-tab').forEach(t=\u003e{\n    if(t.getAttribute('onclick')===`switchPageTab('${name}')`) t.classList.add('active');\n  });\n}\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EXERCISE TABS\n\u002f\u002f ══════════════════════════════════════════\nfunction switchExTab(name){\n  document.querySelectorAll('.ex-tab').forEach(t=\u003et.classList.remove('active'));\n  document.querySelectorAll('.ex-panel').forEach(p=\u003ep.classList.remove('active'));\n  document.getElementById('ex-'+name).classList.add('active');\n  document.querySelectorAll('.ex-tab').forEach(t=\u003e{\n    if(t.getAttribute('onclick')===`switchExTab('${name}')`) t.classList.add('active');\n  });\n}\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EX 1 — FILL IN THE BLANK\n\u002f\u002f ══════════════════════════════════════════\nconst FILL_DATA = [\n  { before:'Hi! ', blank:'Will', after:' you work on Monday?', hint:'Вспомогательный глагол для вопроса в Future Simple', context:'Alex, строка 1' },\n  { before:'Yes, I will. I will ', blank:'work', after:' after lunch.', hint:'После will глагол всегда в base form', context:'Mary, строка 2' },\n  { before:'What ', blank:'will', after:' you do after work?', hint:'Вспомогательный глагол для спец. вопроса в Future Simple', context:'Alex, строка 3' },\n  { before:'I will ', blank:'train', after:'. Do you like sport?', hint:'После will глагол всегда в base form', context:'Mary, строка 4' },\n  { before:'I will train next week every day. Where ', blank:'will', after:' you train?', hint:'Вспомогательный глагол для вопроса Where...?', context:'Alex, строка 5' },\n  { before:'I will ', blank:'train', after:' in the fitness club.', hint:'После will глагол всегда в base form', context:'Mary, строка 6' },\n  { before:'Yes, I do. We will ', blank:'meet', after:' on Sunday.', hint:'После will глагол всегда в base form (инфинитив)', context:'Mary, строка 8' },\n  { before:'I will ', blank:'read', after:' an interesting book in two days.', hint:'После will глагол всегда в base form', context:'Alex, строка 9' },\n];\n\nfunction buildFill(){\n  const list = document.getElementById('fill-list');\n  list.innerHTML = '';\n  FILL_DATA.forEach((d, i) =\u003e {\n    const div = document.createElement('div');\n    div.className = 'fill-item';\n    div.id = `fi-${i}`;\n    div.innerHTML = `\n      \u003cdiv class=\"fill-context\"\u003e${d.context}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"fill-sentence\"\u003e\n        \u003cspan\u003e${d.before}\u003c\u002fspan\u003e\n        \u003cinput class=\"fill-input\" id=\"fi-inp-${i}\" type=\"text\" placeholder=\"?\" autocomplete=\"off\" spellcheck=\"false\" oninput=\"onFillInput(${i})\"\u003e\n        \u003cspan\u003e${d.after}\u003c\u002fspan\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"fill-feedback\" id=\"fi-fb-${i}\"\u003e\u003c\u002fdiv\u003e\n    `;\n    list.appendChild(div);\n  });\n}\n\nfunction onFillInput(i){\n  \u002f\u002f clear previous state on edit\n  const inp = document.getElementById(`fi-inp-${i}`);\n  inp.classList.remove('correct','wrong');\n  const fb = document.getElementById(`fi-fb-${i}`);\n  fb.className = 'fill-feedback';\n  document.getElementById(`fi-${i}`).classList.remove('correct','wrong');\n}\n\nfunction checkFill(){\n  let ok = 0;\n  FILL_DATA.forEach((d, i) =\u003e {\n    const inp = document.getElementById(`fi-inp-${i}`);\n    const val = inp.value.trim().toLowerCase();\n    const correct = d.blank.toLowerCase();\n    const fb = document.getElementById(`fi-fb-${i}`);\n    const item = document.getElementById(`fi-${i}`);\n    fb.className = 'fill-feedback show';\n    if(val === correct){\n      ok++;\n      inp.classList.add('correct');\n      item.classList.add('correct'); item.classList.remove('wrong');\n      fb.className = 'fill-feedback show ok';\n      fb.textContent = '✓ Верно!';\n    } else {\n      inp.classList.add('wrong');\n      item.classList.add('wrong'); item.classList.remove('correct');\n      fb.className = 'fill-feedback show no';\n      fb.textContent = `✗ Правильно: ${d.blank} — Подсказка: ${d.hint}`;\n    }\n  });\n  const bar = document.getElementById('fill-score-bar');\n  bar.style.display = 'flex';\n  document.getElementById('fill-score-num').textContent = `${ok}\u002f${FILL_DATA.length}`;\n  const pct = ok\u002fFILL_DATA.length;\n  document.getElementById('fill-score-stars').textContent = pct\u003e=0.9?'⭐⭐⭐':pct\u003e=0.7?'⭐⭐':pct\u003e=0.5?'⭐':'☆';\n}\n\nfunction resetFill(){\n  document.querySelectorAll('.fill-input').forEach(inp=\u003e{ inp.value=''; inp.classList.remove('correct','wrong'); });\n  document.querySelectorAll('.fill-item').forEach(it=\u003eit.classList.remove('correct','wrong'));\n  document.querySelectorAll('.fill-feedback').forEach(fb=\u003e{ fb.className='fill-feedback'; fb.textContent=''; });\n  document.getElementById('fill-score-bar').style.display='none';\n}\n\nbuildFill();\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EX 2 — MCQ: choose verb form\n\u002f\u002f ══════════════════════════════════════════\nconst MCQ_DATA = [\n  {\n    context: 'Alex, строка 1',\n    q: 'Hi! ___ you work on Monday?',\n    opts: ['Will','Did','Do','Does'],\n    correct: 'Will',\n    explain: 'Future Simple вопрос → Will + подлежащее + base form'\n  },\n  {\n    context: 'Mary, строка 2',\n    q: 'Yes, I will. I will ___ after lunch.',\n    opts: ['work','worked','works','working'],\n    correct: 'work',\n    explain: 'После will глагол всегда в base form (инфинитив)'\n  },\n  {\n    context: 'Alex, строка 3',\n    q: 'What ___ you do after work?',\n    opts: ['will','would','did','do'],\n    correct: 'will',\n    explain: 'Future Simple вопрос → Will + подлежащее + base form'\n  },\n  {\n    context: 'Mary, строка 4',\n    q: 'I will ___. Do you like sport?',\n    opts: ['train','trained','trains','training'],\n    correct: 'train',\n    explain: 'После will глагол всегда в base form'\n  },\n  {\n    context: 'Alex, строка 5',\n    q: 'Where ___ you train?',\n    opts: ['will','did','do','would'],\n    correct: 'will',\n    explain: 'Future Simple вопрос → Will + подлежащее + base form'\n  },\n  {\n    context: 'Mary, строка 8',\n    q: 'We will ___ on Sunday.',\n    opts: ['meet','met','meets','meeting'],\n    correct: 'meet',\n    explain: 'После will глагол всегда в base form: meet (не met)'\n  },\n  {\n    context: 'Alex, строка 9',\n    q: 'I will ___ an interesting book in two days.',\n    opts: ['read','reads','reading','readed'],\n    correct: 'read',\n    explain: 'После will глагол всегда в base form'\n  },\n];\n\nfunction buildMcq(){\n  const list = document.getElementById('mcq-list');\n  list.innerHTML = '';\n  MCQ_DATA.forEach((d,i)=\u003e{\n    const div = document.createElement('div');\n    div.className = 'mcq-item';\n    div.id = `mcq-${i}`;\n    const opts = d.opts.map(o=\u003e`\u003cbutton class=\"mcq-opt\" id=\"mcq-opt-${i}-${o.replace(\u002f\\s\u002fg,'_')}\" onclick=\"pickMcq(${i},'${o}')\"\u003e${o}\u003c\u002fbutton\u003e`).join('');\n    div.innerHTML = `\n      \u003cdiv class=\"mcq-context\"\u003e${d.context}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"mcq-q\"\u003e${d.q}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"mcq-opts\"\u003e${opts}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"mcq-feedback\" id=\"mcq-fb-${i}\"\u003e\u003c\u002fdiv\u003e\n    `;\n    list.appendChild(div);\n  });\n}\n\nlet mcqAnswered = new Array(MCQ_DATA.length).fill(false);\nlet mcqScore = 0;\n\nfunction pickMcq(i, chosen){\n  if(mcqAnswered[i]) return;\n  mcqAnswered[i] = true;\n  const d = MCQ_DATA[i];\n  const item = document.getElementById(`mcq-${i}`);\n  const fb = document.getElementById(`mcq-fb-${i}`);\n  item.querySelectorAll('.mcq-opt').forEach(b=\u003eb.disabled=true);\n  if(chosen === d.correct){\n    mcqScore++;\n    item.classList.add('correct');\n    item.querySelector(`#mcq-opt-${i}-${chosen.replace(\u002f\\s\u002fg,'_')}`).classList.add('correct');\n    fb.className = 'mcq-feedback ok';\n    fb.textContent = '✓ Верно! ' + d.explain;\n  } else {\n    item.classList.add('wrong');\n    item.querySelector(`#mcq-opt-${i}-${chosen.replace(\u002f\\s\u002fg,'_')}`).classList.add('wrong');\n    const corrBtn = item.querySelector(`#mcq-opt-${i}-${d.correct.replace(\u002f\\s\u002fg,'_')}`);\n    if(corrBtn) corrBtn.classList.add('correct');\n    fb.className = 'mcq-feedback no';\n    fb.textContent = `✗ Правильно: ${d.correct} — ${d.explain}`;\n  }\n  \u002f\u002f show score after all answered\n  if(mcqAnswered.every(Boolean)){\n    const bar = document.getElementById('mcq-score-bar');\n    bar.style.display = 'flex';\n    document.getElementById('mcq-score-num').textContent = `${mcqScore}\u002f${MCQ_DATA.length}`;\n    const pct = mcqScore\u002fMCQ_DATA.length;\n    document.getElementById('mcq-score-stars').textContent = pct\u003e=0.9?'⭐⭐⭐':pct\u003e=0.7?'⭐⭐':pct\u003e=0.5?'⭐':'☆';\n    bar.scrollIntoView({behavior:'smooth',block:'nearest'});\n  }\n}\n\nfunction resetMcq(){\n  mcqAnswered = new Array(MCQ_DATA.length).fill(false);\n  mcqScore = 0;\n  document.getElementById('mcq-score-bar').style.display='none';\n  buildMcq();\n}\n\nbuildMcq();\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EX 3 — VERB FINDER\n\u002f\u002f ══════════════════════════════════════════\nconst VF_LINES = [\n  { speaker:'Alex', text:'Hi! Will you work on Monday?', pastVerbs:['Will'] },\n  { speaker:'Mary', text:'Yes, I will. I will work after lunch.', pastVerbs:['will','will'] },\n  { speaker:'Alex', text:'What will you do after work?', pastVerbs:['will'] },\n  { speaker:'Mary', text:'I will train. Do you like sport?', pastVerbs:['will'] },\n  { speaker:'Alex', text:\"Yes, I do. I will train next week every day. Where will you train?\", pastVerbs:['will','will'] },\n  { speaker:'Mary', text:'I will train in the fitness club.', pastVerbs:['will'] },\n  { speaker:'Mary', text:'Yes, I do. We will meet on Sunday. Do you like to read?', pastVerbs:['will'] },\n  { speaker:'Alex', text:'Yes, I do. I will read an interesting book in two days.', pastVerbs:['will'] },\n];\n\n\u002f\u002f All past simple verbs across lines (normalised)\nconst ALL_PAST = ['did','worked','trained','met','read'];\n\nfunction buildVF(){\n  const container = document.getElementById('vf-lines');\n  container.innerHTML = '';\n  VF_LINES.forEach((l,li)=\u003e{\n    const div = document.createElement('div');\n    div.className = 'vf-line';\n    const words = l.text.split(\u002f(\\s+|(?=[.,!?])|(?\u003c=[.,!?]))\u002f);\n    const spans = words.map((w,wi)=\u003e{\n      const clean = w.replace(\u002f[^a-zA-Z']\u002fg,'').toLowerCase();\n      const isPast = l.pastVerbs.map(v=\u003ev.toLowerCase()).includes(clean) && \u002f[a-zA-Z]\u002f.test(w);\n      if(!isPast || !\u002f[a-zA-Z]\u002f.test(w)) return `\u003cspan\u003e${w}\u003c\u002fspan\u003e`;\n      return `\u003cspan class=\"vf-word\" data-li=\"${li}\" data-wi=\"${wi}\" data-correct=\"1\" onclick=\"toggleVFWord(this)\"\u003e${w}\u003c\u002fspan\u003e`;\n    }).join('');\n    \u002f\u002f Also make non-past words clickable to catch wrong selections\n    const allSpans = l.text.split(' ').map((w,wi)=\u003e{\n      const clean = w.replace(\u002f[^a-zA-Z']\u002fg,'').toLowerCase();\n      const isPast = l.pastVerbs.map(v=\u003ev.toLowerCase()).includes(clean);\n      if(isPast){\n        return `\u003cspan class=\"vf-word\" data-li=\"${li}\" data-wi=\"${wi}\" data-correct=\"1\" onclick=\"toggleVFWord(this)\"\u003e${w}\u003c\u002fspan\u003e`;\n      }\n      return `\u003cspan class=\"vf-word\" data-li=\"${li}\" data-wi=\"${wi}\" data-correct=\"0\" onclick=\"toggleVFWord(this)\"\u003e${w}\u003c\u002fspan\u003e`;\n    }).join(' ');\n    div.innerHTML = `\u003cdiv class=\"vf-speaker\"\u003e${l.speaker}\u003c\u002fdiv\u003e\u003cdiv class=\"vf-text\"\u003e${allSpans}\u003c\u002fdiv\u003e`;\n    container.appendChild(div);\n  });\n}\n\nfunction toggleVFWord(el){\n  el.classList.toggle('selected');\n  if(!el.classList.contains('selected')){\n    el.classList.remove('selected-ok','selected-no');\n  }\n}\n\nfunction checkVF(){\n  let found = 0, wrong = 0, total = VF_LINES.reduce((s,l)=\u003es+l.pastVerbs.length,0);\n  document.querySelectorAll('.vf-word').forEach(el=\u003e{\n    const isCorrect = el.dataset.correct === '1';\n    const isSelected = el.classList.contains('selected');\n    el.classList.remove('selected','selected-ok','selected-no');\n    if(isSelected){\n      if(isCorrect){ el.classList.add('selected-ok'); found++; }\n      else { el.classList.add('selected-no'); wrong++; }\n    }\n  });\n  const bar = document.getElementById('vf-score-bar');\n  bar.style.display = 'flex';\n  document.getElementById('vf-score-num').textContent = `${found}\u002f${total} (лишних: ${wrong})`;\n  const pct = wrong===0 ? found\u002ftotal : Math.max(0,(found-wrong)\u002ftotal);\n  document.getElementById('vf-score-stars').textContent = pct\u003e=0.9?'⭐⭐⭐':pct\u003e=0.7?'⭐⭐':pct\u003e=0.5?'⭐':'☆';\n}\n\nfunction resetVF(){\n  document.getElementById('vf-score-bar').style.display='none';\n  buildVF();\n}\n\nbuildVF();\n\u003c\u002fscript\u003e\n\u003c\u002fbody\u003e\n\u003c\u002fhtml\u003e\n";
const DIALOGUE_PRESENT_HTML = "\u003c!DOCTYPE html\u003e\n\u003chtml lang=\"ru\"\u003e\n\u003chead\u003e\n\u003cmeta charset=\"UTF-8\"\u003e\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\u003e\n\u003ctitle\u003ePast Simple · Диалог\u003c\u002ftitle\u003e\n\u003clink href=\"https:\u002f\u002ffonts.googleapis.com\u002fcss2?family=Unbounded:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap\" rel=\"stylesheet\"\u003e\n\u003cstyle\u003e\n  :root {\n    --bg: #0f0f13;\n    --card: #18181f;\n    --card2: #1f1f2a;\n    --border: #2a2a38;\n    --text: #f0f0f5;\n    --muted: #7070a0;\n    --alex: #4f8ef7;\n    --alex-bg: #0d1f3c;\n    --mary: #e85d9a;\n    --mary-bg: #2d0d1f;\n    --accent: #1A4A7A;\n    --green: #34d399;\n    --yellow: #fbbf24;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    font-family: 'DM Sans', sans-serif;\n    background: var(--bg);\n    color: var(--text);\n    min-height: 100vh;\n    padding-bottom: 3rem;\n  }\n\n  \u002f* ── HEADER ── *\u002f\n  header {\n    padding: 2rem 1.5rem 1.5rem;\n    max-width: 700px;\n    margin: 0 auto;\n    position: relative;\n  }\n\n  .header-tag {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 0.6rem;\n    letter-spacing: 0.15em;\n    color: var(--accent);\n    text-transform: uppercase;\n    margin-bottom: 0.5rem;\n  }\n\n  header h1 {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 1.35rem;\n    font-weight: 700;\n    line-height: 1.25;\n    color: var(--text);\n    margin-bottom: 0.4rem;\n  }\n\n  header p {\n    font-size: 0.82rem;\n    color: var(--muted);\n  }\n\n  \u002f* ── CONTROLS ── *\u002f\n  .controls {\n    max-width: 700px;\n    margin: 0 auto 1.5rem;\n    padding: 0 1.5rem;\n    display: flex;\n    gap: 10px;\n    flex-wrap: wrap;\n    align-items: center;\n  }\n\n  .btn {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.82rem;\n    font-weight: 500;\n    border: none;\n    border-radius: 10px;\n    padding: 9px 18px;\n    cursor: pointer;\n    transition: transform 0.1s, opacity 0.1s;\n    display: flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .btn:active { transform: scale(0.96); }\n  .btn:disabled { opacity: 0.35; cursor: default; }\n\n  .btn-play-all {\n    background: var(--accent);\n    color: #fff;\n    font-weight: 600;\n  }\n  .btn-stop {\n    background: var(--card2);\n    color: var(--text);\n    border: 1px solid var(--border);\n  }\n  .btn-reveal {\n    background: var(--card2);\n    color: var(--yellow);\n    border: 1px solid #3a3018;\n    margin-left: auto;\n  }\n\n  .speed-wrap {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 0.78rem;\n    color: var(--muted);\n  }\n  .speed-wrap input[type=range] {\n    width: 80px;\n    accent-color: var(--accent);\n  }\n\n  \u002f* ── PROGRESS BAR ── *\u002f\n  .progress-wrap {\n    max-width: 700px;\n    margin: 0 auto 1rem;\n    padding: 0 1.5rem;\n  }\n  .progress-track {\n    height: 3px;\n    background: var(--border);\n    border-radius: 2px;\n    overflow: hidden;\n  }\n  .progress-fill {\n    height: 100%;\n    background: var(--accent);\n    border-radius: 2px;\n    width: 0%;\n    transition: width 0.4s ease;\n  }\n\n  \u002f* ── DIALOGUE ── *\u002f\n  .dialogue {\n    max-width: 700px;\n    margin: 0 auto;\n    padding: 0 1.5rem;\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n  }\n\n  .line {\n    display: flex;\n    gap: 12px;\n    align-items: flex-start;\n    border-radius: 14px;\n    padding: 12px 14px;\n    border: 1px solid var(--border);\n    background: var(--card);\n    transition: background 0.2s, border-color 0.2s, transform 0.15s;\n    cursor: pointer;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .line:hover { background: var(--card2); }\n\n  .line.playing {\n    border-color: var(--accent);\n    background: #1a1530;\n    transform: translateX(4px);\n  }\n  .line.alex.playing { border-color: var(--alex); background: #0b1628; }\n  .line.mary.playing { border-color: var(--mary); background: #200b18; }\n\n  \u002f* speaker glow line on left *\u002f\n  .line::before {\n    content: '';\n    position: absolute;\n    left: 0; top: 0; bottom: 0;\n    width: 3px;\n    border-radius: 3px 0 0 3px;\n    background: transparent;\n    transition: background 0.2s;\n  }\n  .line.alex::before { background: var(--alex); opacity: 0.5; }\n  .line.mary::before { background: var(--mary); opacity: 0.5; }\n  .line.playing.alex::before { opacity: 1; }\n  .line.playing.mary::before { opacity: 1; }\n\n  .line-num {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 0.6rem;\n    color: var(--muted);\n    min-width: 18px;\n    padding-top: 3px;\n    text-align: right;\n  }\n\n  .speaker-icon {\n    width: 32px;\n    height: 32px;\n    border-radius: 50%;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 0.7rem;\n    font-weight: 700;\n    font-family: 'Unbounded', sans-serif;\n    flex-shrink: 0;\n    letter-spacing: 0;\n  }\n  .alex .speaker-icon { background: var(--alex-bg); color: var(--alex); }\n  .mary .speaker-icon { background: var(--mary-bg); color: var(--mary); }\n\n  .line-body { flex: 1; min-width: 0; }\n\n  .line-ru {\n    font-size: 0.8rem;\n    color: var(--muted);\n    margin-bottom: 4px;\n    line-height: 1.4;\n  }\n\n  .line-en {\n    font-size: 0.92rem;\n    font-weight: 500;\n    color: var(--text);\n    line-height: 1.4;\n    transition: filter 0.3s;\n  }\n  .line-en.hidden {\n    filter: blur(6px);\n    user-select: none;\n    color: var(--muted);\n  }\n\n  .play-btn {\n    width: 32px;\n    height: 32px;\n    border-radius: 50%;\n    border: 1px solid var(--border);\n    background: var(--card2);\n    color: var(--muted);\n    cursor: pointer;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 0.85rem;\n    flex-shrink: 0;\n    transition: background 0.12s, color 0.12s, border-color 0.12s;\n  }\n  .play-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }\n  .line.playing .play-btn { background: var(--accent); color: #fff; border-color: var(--accent); animation: pulse 1s ease infinite; }\n  @keyframes pulse {\n    0%, 100% { box-shadow: 0 0 0 0 rgba(124,92,252,0.5); }\n    50%       { box-shadow: 0 0 0 6px rgba(124,92,252,0); }\n  }\n\n  \u002f* ── PAGE TABS ── *\u002f\n  .page-tabs {\n    max-width: 700px;\n    margin: 0 auto 0;\n    padding: 0 1.5rem;\n    display: flex;\n    gap: 0;\n    border-bottom: 2px solid var(--border);\n  }\n  .page-tab {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 500;\n    background: none;\n    border: none;\n    color: var(--muted);\n    padding: 10px 20px;\n    cursor: pointer;\n    border-bottom: 2px solid transparent;\n    margin-bottom: -2px;\n    transition: color 0.15s, border-color 0.15s;\n  }\n  .page-tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }\n  .page-tab:hover:not(.active) { color: var(--text); }\n  .tab-panel { display: none; }\n  .tab-panel.active { display: block; }\n\n  \u002f* ── GRAMMAR EXERCISE ── *\u002f\n  .ex-wrap {\n    max-width: 700px;\n    margin: 0 auto;\n    padding: 1.5rem 1.5rem 0;\n  }\n  .ex-header {\n    margin-bottom: 1.2rem;\n  }\n  .ex-header h2 {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 1rem;\n    font-weight: 700;\n    margin-bottom: 0.3rem;\n  }\n  .ex-header p { font-size: 0.82rem; color: var(--muted); }\n\n  .ex-tabs {\n    display: flex;\n    gap: 8px;\n    flex-wrap: wrap;\n    margin-bottom: 1.2rem;\n  }\n  .ex-tab {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.78rem;\n    font-weight: 500;\n    padding: 6px 14px;\n    border-radius: 100px;\n    border: 1px solid var(--border);\n    background: var(--card);\n    color: var(--muted);\n    cursor: pointer;\n    transition: all 0.15s;\n  }\n  .ex-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }\n  .ex-tab:hover:not(.active) { color: var(--text); border-color: var(--muted); }\n\n  .ex-panel { display: none; }\n  .ex-panel.active { display: block; }\n\n  \u002f* Fill in the blank *\u002f\n  .fill-list { display: flex; flex-direction: column; gap: 10px; }\n  .fill-item {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 14px 16px;\n    transition: border-color 0.2s;\n  }\n  .fill-item.correct { border-color: var(--green); background: #0d1f16; }\n  .fill-item.wrong   { border-color: #f87171; background: #1f0d0d; }\n  .fill-context {\n    font-size: 0.78rem;\n    color: var(--muted);\n    margin-bottom: 6px;\n  }\n  .fill-sentence {\n    font-size: 0.92rem;\n    font-weight: 500;\n    line-height: 1.6;\n    display: flex;\n    align-items: center;\n    flex-wrap: wrap;\n    gap: 4px;\n  }\n  .fill-input {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.9rem;\n    font-weight: 600;\n    background: var(--card2);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    color: var(--text);\n    padding: 3px 10px;\n    min-width: 100px;\n    outline: none;\n    transition: border-color 0.15s;\n    text-align: center;\n  }\n  .fill-input:focus { border-color: var(--accent); }\n  .fill-input.correct { border-color: var(--green); color: var(--green); background: #0d1f16; }\n  .fill-input.wrong   { border-color: #f87171; color: #f87171; background: #1f0d0d; }\n  .fill-feedback {\n    font-size: 0.78rem;\n    margin-top: 6px;\n    min-height: 1.2em;\n    display: none;\n  }\n  .fill-feedback.show { display: block; }\n  .fill-feedback.ok { color: var(--green); }\n  .fill-feedback.no { color: #f87171; }\n\n  \u002f* MCQ *\u002f\n  .mcq-list { display: flex; flex-direction: column; gap: 12px; }\n  .mcq-item {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 14px 16px;\n  }\n  .mcq-item.correct { border-color: var(--green); background: #0d1f16; }\n  .mcq-item.wrong   { border-color: #f87171; background: #1f0d0d; }\n  .mcq-q {\n    font-size: 0.92rem;\n    font-weight: 500;\n    margin-bottom: 10px;\n    line-height: 1.5;\n  }\n  .mcq-context { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }\n  .mcq-opts { display: flex; gap: 8px; flex-wrap: wrap; }\n  .mcq-opt {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 500;\n    padding: 7px 16px;\n    border-radius: 10px;\n    border: 1px solid var(--border);\n    background: var(--card2);\n    color: var(--text);\n    cursor: pointer;\n    transition: all 0.12s;\n  }\n  .mcq-opt:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }\n  .mcq-opt:disabled { cursor: default; }\n  .mcq-opt.correct { background: #0d1f16; border-color: var(--green); color: var(--green); }\n  .mcq-opt.wrong   { background: #1f0d0d; border-color: #f87171; color: #f87171; }\n  .mcq-feedback { font-size: 0.78rem; margin-top: 8px; min-height: 1.1em; }\n  .mcq-feedback.ok { color: var(--green); }\n  .mcq-feedback.no { color: #f87171; }\n\n  \u002f* Verb finder *\u002f\n  .vf-instruction { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; line-height: 1.5; }\n  .vf-lines { display: flex; flex-direction: column; gap: 8px; }\n  .vf-line {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 12px 16px;\n  }\n  .vf-speaker { font-size: 0.7rem; font-family: 'Unbounded', sans-serif; color: var(--muted); margin-bottom: 4px; }\n  .vf-text { font-size: 0.92rem; font-weight: 500; line-height: 1.6; }\n  .vf-word {\n    cursor: pointer;\n    border-radius: 4px;\n    padding: 1px 3px;\n    transition: background 0.12s;\n    display: inline-block;\n  }\n  .vf-word:hover { background: var(--card2); }\n  .vf-word.selected-ok { background: #0d1f16; color: var(--green); border-radius: 6px; }\n  .vf-word.selected-no { background: #1f0d0d; color: #f87171; border-radius: 6px; }\n  .vf-result { font-size: 0.78rem; margin-top: 8px; color: var(--muted); }\n\n  \u002f* Score bar *\u002f\n  .score-bar {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 14px 18px;\n    margin-bottom: 1.2rem;\n    display: flex;\n    align-items: center;\n    gap: 14px;\n  }\n  .score-num { font-family: 'Unbounded', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--accent); }\n  .score-label { font-size: 0.8rem; color: var(--muted); }\n  .score-stars { font-size: 1.1rem; margin-left: auto; }\n\n  .ex-check-btn {\n    margin-top: 1rem;\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 600;\n    padding: 10px 22px;\n    border-radius: 10px;\n    border: none;\n    background: var(--accent);\n    color: #fff;\n    cursor: pointer;\n    transition: opacity 0.1s, transform 0.1s;\n  }\n  .ex-check-btn:active { transform: scale(0.96); }\n  .ex-reset-btn {\n    margin-top: 0.5rem;\n    margin-left: 8px;\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 500;\n    padding: 10px 18px;\n    border-radius: 10px;\n    border: 1px solid var(--border);\n    background: var(--card2);\n    color: var(--muted);\n    cursor: pointer;\n  }\n\n  \u002f* ── NOTICE ── *\u002f\n  .notice {\n    max-width: 700px;\n    margin: 1.5rem auto 0;\n    padding: 0 1.5rem;\n  }\n  .notice-inner {\n    background: #1a1520;\n    border: 1px solid #2a2040;\n    border-radius: 12px;\n    padding: 12px 16px;\n    font-size: 0.78rem;\n    color: var(--muted);\n    display: flex;\n    gap: 10px;\n    align-items: flex-start;\n  }\n  .notice-inner .ico { font-size: 1rem; flex-shrink: 0; }\n\n  \u002f* ── STATUS ── *\u002f\n  .status {\n    max-width: 700px;\n    margin: 0.75rem auto 0;\n    padding: 0 1.5rem;\n    font-size: 0.75rem;\n    color: var(--muted);\n    min-height: 1.2em;\n  }\n\u003c\u002fstyle\u003e\n\u003c\u002fhead\u003e\n\u003cbody\u003e\n\n\u003cheader\u003e\n  \u003cdiv class=\"header-tag\"\u003ePresent Simple Tense · Диалог Alex & Mary\u003c\u002fdiv\u003e\n  \u003ch1\u003eАудио + Грамматика\u003c\u002fh1\u003e\n  \u003cp\u003eДва режима: слушайте диалог или выполните грамматическое упражнение.\u003c\u002fp\u003e\n\u003c\u002fheader\u003e\n\n\u003c!-- Page Tabs --\u003e\n\u003cdiv class=\"page-tabs\"\u003e\n  \u003cbutton class=\"page-tab active\" onclick=\"switchPageTab('audio')\"\u003e🔊 Диалог\u003c\u002fbutton\u003e\n  \u003cbutton class=\"page-tab\" onclick=\"switchPageTab('grammar')\"\u003e✏️ Грамматика\u003c\u002fbutton\u003e\n\u003c\u002fdiv\u003e\n\n\u003c!-- ═══ TAB: AUDIO ═══ --\u003e\n\u003cdiv class=\"tab-panel active\" id=\"ptab-audio\"\u003e\n\n\u003cdiv class=\"controls\"\u003e\n  \u003cbutton class=\"btn btn-play-all\" id=\"btn-play-all\" onclick=\"playAll()\"\u003e▶ Слушать весь диалог\u003c\u002fbutton\u003e\n  \u003cbutton class=\"btn btn-stop\" id=\"btn-stop\" onclick=\"stopAll()\" disabled\u003e■ Стоп\u003c\u002fbutton\u003e\n  \u003cdiv class=\"speed-wrap\"\u003e\n    🐢\n    \u003cinput type=\"range\" id=\"speed\" min=\"0.6\" max=\"1.3\" step=\"0.1\" value=\"0.9\" oninput=\"updateSpeed(this.value)\"\u003e\n    🐇\n    \u003cspan id=\"speed-val\"\u003e0.9×\u003c\u002fspan\u003e\n  \u003c\u002fdiv\u003e\n  \u003cbutton class=\"btn btn-reveal\" id=\"btn-reveal\" onclick=\"toggleReveal()\"\u003e👁 Скрыть перевод\u003c\u002fbutton\u003e\n\u003c\u002fdiv\u003e\n\n\u003cdiv class=\"progress-wrap\"\u003e\n  \u003cdiv class=\"progress-track\"\u003e\u003cdiv class=\"progress-fill\" id=\"progress-fill\"\u003e\u003c\u002fdiv\u003e\u003c\u002fdiv\u003e\n\u003c\u002fdiv\u003e\n\u003cdiv class=\"status\" id=\"status\"\u003e\u003c\u002fdiv\u003e\n\n\u003cdiv class=\"dialogue\" id=\"dialogue\"\u003e\u003c\u002fdiv\u003e\n\n\u003cdiv class=\"notice\"\u003e\n  \u003cdiv class=\"notice-inner\"\u003e\n    \u003cspan class=\"ico\"\u003e💬\u003c\u002fspan\u003e\n    \u003cspan\u003eОзвучивание работает через Web Speech API — встроенный синтез речи браузера. Лучшее качество в \u003cb\u003eGoogle Chrome\u003c\u002fb\u003e. Если звука нет — проверьте, что браузер не заглушён.\u003c\u002fspan\u003e\n  \u003c\u002fdiv\u003e\n\u003c\u002fdiv\u003e\n\n\u003c\u002fdiv\u003e\u003c!-- \u002fptab-audio --\u003e\n\n\u003c!-- ═══ TAB: GRAMMAR ═══ --\u003e\n\u003cdiv class=\"tab-panel\" id=\"ptab-grammar\"\u003e\n\u003cdiv class=\"ex-wrap\"\u003e\n\n  \u003cdiv class=\"ex-header\"\u003e\n    \u003ch2\u003eГрамматические упражнения\u003c\u002fh2\u003e\n    \u003cp\u003eТри типа заданий на основе диалога. Выберите упражнение:\u003c\u002fp\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003cdiv class=\"ex-tabs\"\u003e\n    \u003cbutton class=\"ex-tab active\" onclick=\"switchExTab('fill')\"\u003e1 · Вставьте слово\u003c\u002fbutton\u003e\n    \u003cbutton class=\"ex-tab\" onclick=\"switchExTab('mcq')\"\u003e2 · Выберите форму\u003c\u002fbutton\u003e\n    \u003cbutton class=\"ex-tab\" onclick=\"switchExTab('vf')\"\u003e3 · Найдите глаголы\u003c\u002fbutton\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003c!-- ── EX 1: Fill in the blank ── --\u003e\n  \u003cdiv class=\"ex-panel active\" id=\"ex-fill\"\u003e\n    \u003cdiv class=\"score-bar\" id=\"fill-score-bar\" style=\"display:none\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv class=\"score-num\" id=\"fill-score-num\"\u003e0\u002f8\u003c\u002fdiv\u003e\n        \u003cdiv class=\"score-label\"\u003eправильных ответов\u003c\u002fdiv\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"score-stars\" id=\"fill-score-stars\"\u003e\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"fill-list\" id=\"fill-list\"\u003e\u003c\u002fdiv\u003e\n    \u003cdiv\u003e\n      \u003cbutton class=\"ex-check-btn\" onclick=\"checkFill()\"\u003eПроверить\u003c\u002fbutton\u003e\n      \u003cbutton class=\"ex-reset-btn\" onclick=\"resetFill()\"\u003eСбросить\u003c\u002fbutton\u003e\n    \u003c\u002fdiv\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003c!-- ── EX 2: MCQ ── --\u003e\n  \u003cdiv class=\"ex-panel\" id=\"ex-mcq\"\u003e\n    \u003cdiv class=\"score-bar\" id=\"mcq-score-bar\" style=\"display:none\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv class=\"score-num\" id=\"mcq-score-num\"\u003e0\u002f7\u003c\u002fdiv\u003e\n        \u003cdiv class=\"score-label\"\u003eправильных ответов\u003c\u002fdiv\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"score-stars\" id=\"mcq-score-stars\"\u003e\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"mcq-list\" id=\"mcq-list\"\u003e\u003c\u002fdiv\u003e\n    \u003cdiv style=\"margin-top:1rem;\"\u003e\n      \u003cbutton class=\"ex-reset-btn\" onclick=\"resetMcq()\"\u003eСбросить\u003c\u002fbutton\u003e\n    \u003c\u002fdiv\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003c!-- ── EX 3: Verb finder ── --\u003e\n  \u003cdiv class=\"ex-panel\" id=\"ex-vf\"\u003e\n    \u003cdiv class=\"vf-instruction\"\u003e\n      Нажимайте на глаголы, которые стоят в \u003cb\u003ePresent Simple\u003c\u002fb\u003e (настоящее простое время). Нажмите ещё раз — снять выбор.\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"score-bar\" id=\"vf-score-bar\" style=\"display:none\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv class=\"score-num\" id=\"vf-score-num\"\u003e0\u002f8\u003c\u002fdiv\u003e\n        \u003cdiv class=\"score-label\"\u003eглаголов найдено\u003c\u002fdiv\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"score-stars\" id=\"vf-score-stars\"\u003e\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"vf-lines\" id=\"vf-lines\"\u003e\u003c\u002fdiv\u003e\n    \u003cdiv style=\"margin-top:1rem;\"\u003e\n      \u003cbutton class=\"ex-check-btn\" onclick=\"checkVF()\"\u003eПроверить\u003c\u002fbutton\u003e\n      \u003cbutton class=\"ex-reset-btn\" onclick=\"resetVF()\"\u003eСбросить\u003c\u002fbutton\u003e\n    \u003c\u002fdiv\u003e\n  \u003c\u002fdiv\u003e\n\n\u003c\u002fdiv\u003e\n\u003c\u002fdiv\u003e\u003c!-- \u002fptab-grammar --\u003e\n\n\u003cscript\u003e\nconst LINES = [\n  { speaker:'Alex', ru:'Привет! Ты работаешь в понедельник?',                          en:'Hi! Do you work on Monday?' },\n  { speaker:'Mary', ru:'Да. Я работаю после обеда.',                                    en:'Yes, I do. I work after lunch.' },\n  { speaker:'Alex', ru:'Что ты делаешь после работы?',                                  en:'What do you do after work?' },\n  { speaker:'Mary', ru:'Я тренируюсь каждый день. Ты любишь спорт?',                    en:'I train every day. Do you like sport?' },\n  { speaker:'Alex', ru:'Да. Я тренируюсь по выходным. Где ты тренируешься?',            en:'Yes, I do. I train on weekends. Where do you train?' },\n  { speaker:'Mary', ru:'Я тренируюсь в фитнес клубе.',                                  en:'I train in the fitness club.' },\n  { speaker:'Alex', ru:'У тебя много друзей?',                                           en:'Do you have many friends?' },\n  { speaker:'Mary', ru:'Да. Мы встречаемся в воскресенье. Ты любишь читать?',           en:'Yes, I do. We meet on Sunday. Do you like to read?' },\n  { speaker:'Alex', ru:'Да. Я люблю читать и смотреть интересные фильмы по вечерам.',   en:'Yes, I do. I like to read and to watch interesting films in the evening.' },\n  { speaker:'Mary', ru:'Спасибо за звонок.',                                              en:'Thank you for calling.' },\n  { speaker:'Alex', ru:'Хорошего дня.',                                                   en:'Have a nice day.' },\n];\n\nlet currentIdx = -1;\nlet isPlayingAll = false;\nlet speechRate = 0.9;\nlet revealed = true;\n\n\u002f\u002f Build UI\nconst dlg = document.getElementById('dialogue');\nLINES.forEach((l, i) =\u003e {\n  const sp = l.speaker.toLowerCase();\n  const div = document.createElement('div');\n  div.className = `line ${sp}`;\n  div.id = `line-${i}`;\n  div.onclick = () =\u003e playSingle(i);\n  div.innerHTML = `\n    \u003cspan class=\"line-num\"\u003e${i+1}\u003c\u002fspan\u003e\n    \u003cdiv class=\"speaker-icon\"\u003e${l.speaker.substring(0,2).toUpperCase()}\u003c\u002fdiv\u003e\n    \u003cdiv class=\"line-body\"\u003e\n      \u003cdiv class=\"line-ru\"\u003e${l.ru}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"line-en\" id=\"en-${i}\"\u003e${l.en}\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cbutton class=\"play-btn\" onclick=\"event.stopPropagation();playSingle(${i})\"\u003e▶\u003c\u002fbutton\u003e\n  `;\n  dlg.appendChild(div);\n});\n\nfunction updateSpeed(v){\n  speechRate = parseFloat(v);\n  document.getElementById('speed-val').textContent = v + '×';\n}\n\nfunction setStatus(txt){ document.getElementById('status').textContent = txt; }\n\nfunction setProgress(i){\n  const pct = LINES.length ? ((i+1)\u002fLINES.length*100) : 0;\n  document.getElementById('progress-fill').style.width = pct + '%';\n}\n\nfunction clearHighlight(){\n  document.querySelectorAll('.line').forEach(l=\u003el.classList.remove('playing'));\n}\n\nfunction highlight(i){\n  clearHighlight();\n  const el = document.getElementById(`line-${i}`);\n  if(el){\n    el.classList.add('playing');\n    el.scrollIntoView({behavior:'smooth', block:'nearest'});\n  }\n  setProgress(i);\n}\n\nfunction speak(text, rate){\n  return new Promise((resolve) =\u003e {\n    window.speechSynthesis.cancel();\n    const u = new SpeechSynthesisUtterance(text);\n    u.lang = 'en-GB';\n    u.rate = rate || speechRate;\n    \u002f\u002f Try to pick an English voice\n    const voices = window.speechSynthesis.getVoices();\n    const en = voices.find(v=\u003ev.lang.startsWith('en-') && v.name.toLowerCase().includes('female'))\n            || voices.find(v=\u003ev.lang.startsWith('en-'))\n            || null;\n    if(en) u.voice = en;\n    u.onend = resolve;\n    u.onerror = resolve;\n    window.speechSynthesis.speak(u);\n  });\n}\n\nasync function playSingle(i){\n  stopAll();\n  currentIdx = i;\n  highlight(i);\n  setStatus(`Воспроизведение: строка ${i+1} — ${LINES[i].speaker}`);\n  await speak(LINES[i].en);\n  clearHighlight();\n  setStatus('');\n  currentIdx = -1;\n}\n\nasync function playAll(){\n  stopAll();\n  isPlayingAll = true;\n  document.getElementById('btn-play-all').disabled = true;\n  document.getElementById('btn-stop').disabled = false;\n  document.getElementById('progress-fill').style.width = '0%';\n\n  for(let i = 0; i \u003c LINES.length; i++){\n    if(!isPlayingAll) break;\n    currentIdx = i;\n    highlight(i);\n    setStatus(`▶ ${i+1} \u002f ${LINES.length} — ${LINES[i].speaker}: «${LINES[i].en}»`);\n    await speak(LINES[i].en);\n    \u002f\u002f small pause between lines\n    if(isPlayingAll) await new Promise(r=\u003esetTimeout(r, 600));\n  }\n\n  clearHighlight();\n  setStatus(isPlayingAll ? '✅ Диалог завершён' : '');\n  document.getElementById('progress-fill').style.width = isPlayingAll ? '100%' : '0%';\n  document.getElementById('btn-play-all').disabled = false;\n  document.getElementById('btn-stop').disabled = true;\n  isPlayingAll = false;\n  currentIdx = -1;\n}\n\nfunction stopAll(){\n  isPlayingAll = false;\n  window.speechSynthesis.cancel();\n  clearHighlight();\n  setStatus('');\n  document.getElementById('btn-play-all').disabled = false;\n  document.getElementById('btn-stop').disabled = true;\n  currentIdx = -1;\n}\n\nfunction toggleReveal(){\n  revealed = !revealed;\n  const btn = document.getElementById('btn-reveal');\n  document.querySelectorAll('.line-en').forEach(el=\u003e{\n    el.classList.toggle('hidden', !revealed);\n  });\n  btn.textContent = revealed ? '👁 Скрыть перевод' : '👁 Показать перевод';\n}\n\n\u002f\u002f Load voices (Chrome needs this trigger)\nwindow.speechSynthesis.onvoiceschanged = () =\u003e { window.speechSynthesis.getVoices(); };\nwindow.speechSynthesis.getVoices();\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f PAGE TABS\n\u002f\u002f ══════════════════════════════════════════\nfunction switchPageTab(name){\n  document.querySelectorAll('.page-tab').forEach(t=\u003et.classList.remove('active'));\n  document.querySelectorAll('.tab-panel').forEach(p=\u003ep.classList.remove('active'));\n  document.getElementById('ptab-'+name).classList.add('active');\n  document.querySelectorAll('.page-tab').forEach(t=\u003e{\n    if(t.getAttribute('onclick')===`switchPageTab('${name}')`) t.classList.add('active');\n  });\n}\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EXERCISE TABS\n\u002f\u002f ══════════════════════════════════════════\nfunction switchExTab(name){\n  document.querySelectorAll('.ex-tab').forEach(t=\u003et.classList.remove('active'));\n  document.querySelectorAll('.ex-panel').forEach(p=\u003ep.classList.remove('active'));\n  document.getElementById('ex-'+name).classList.add('active');\n  document.querySelectorAll('.ex-tab').forEach(t=\u003e{\n    if(t.getAttribute('onclick')===`switchExTab('${name}')`) t.classList.add('active');\n  });\n}\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EX 1 — FILL IN THE BLANK\n\u002f\u002f ══════════════════════════════════════════\nconst FILL_DATA = [\n  { before:'Hi! ', blank:'Do', after:' you work on Monday?', hint:'Вспомогательный глагол для вопроса в Present Simple (you → Do)', context:'Alex, строка 1' },\n  { before:'Yes, I do. I ', blank:'work', after:' after lunch.', hint:'Present Simple: I\u002fyou\u002fwe\u002fthey → base form без окончания', context:'Mary, строка 2' },\n  { before:'What ', blank:'do', after:' you do after work?', hint:'Вспомогательный глагол для спец. вопроса (you → do)', context:'Alex, строка 3' },\n  { before:'I ', blank:'train', after:' every day. Do you like sport?', hint:'Present Simple: I → base form без окончания', context:'Mary, строка 4' },\n  { before:'Yes, I do. I train on weekends. Where ', blank:'do', after:' you train?', hint:'Вспомогательный глагол для вопроса Where...? (you → do)', context:'Alex, строка 5' },\n  { before:'I ', blank:'train', after:' in the fitness club.', hint:'Present Simple: I → base form без окончания', context:'Mary, строка 6' },\n  { before:'Yes, I do. We ', blank:'meet', after:' on Sunday.', hint:'Present Simple: we → base form без окончания', context:'Mary, строка 8' },\n  { before:'I like to read and to ', blank:'watch', after:' interesting films in the evening.', hint:'После to глагол всегда в base form (инфинитив)', context:'Alex, строка 9' },\n];\n\nfunction buildFill(){\n  const list = document.getElementById('fill-list');\n  list.innerHTML = '';\n  FILL_DATA.forEach((d, i) =\u003e {\n    const div = document.createElement('div');\n    div.className = 'fill-item';\n    div.id = `fi-${i}`;\n    div.innerHTML = `\n      \u003cdiv class=\"fill-context\"\u003e${d.context}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"fill-sentence\"\u003e\n        \u003cspan\u003e${d.before}\u003c\u002fspan\u003e\n        \u003cinput class=\"fill-input\" id=\"fi-inp-${i}\" type=\"text\" placeholder=\"?\" autocomplete=\"off\" spellcheck=\"false\" oninput=\"onFillInput(${i})\"\u003e\n        \u003cspan\u003e${d.after}\u003c\u002fspan\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"fill-feedback\" id=\"fi-fb-${i}\"\u003e\u003c\u002fdiv\u003e\n    `;\n    list.appendChild(div);\n  });\n}\n\nfunction onFillInput(i){\n  \u002f\u002f clear previous state on edit\n  const inp = document.getElementById(`fi-inp-${i}`);\n  inp.classList.remove('correct','wrong');\n  const fb = document.getElementById(`fi-fb-${i}`);\n  fb.className = 'fill-feedback';\n  document.getElementById(`fi-${i}`).classList.remove('correct','wrong');\n}\n\nfunction checkFill(){\n  let ok = 0;\n  FILL_DATA.forEach((d, i) =\u003e {\n    const inp = document.getElementById(`fi-inp-${i}`);\n    const val = inp.value.trim().toLowerCase();\n    const correct = d.blank.toLowerCase();\n    const fb = document.getElementById(`fi-fb-${i}`);\n    const item = document.getElementById(`fi-${i}`);\n    fb.className = 'fill-feedback show';\n    if(val === correct){\n      ok++;\n      inp.classList.add('correct');\n      item.classList.add('correct'); item.classList.remove('wrong');\n      fb.className = 'fill-feedback show ok';\n      fb.textContent = '✓ Верно!';\n    } else {\n      inp.classList.add('wrong');\n      item.classList.add('wrong'); item.classList.remove('correct');\n      fb.className = 'fill-feedback show no';\n      fb.textContent = `✗ Правильно: ${d.blank} — Подсказка: ${d.hint}`;\n    }\n  });\n  const bar = document.getElementById('fill-score-bar');\n  bar.style.display = 'flex';\n  document.getElementById('fill-score-num').textContent = `${ok}\u002f${FILL_DATA.length}`;\n  const pct = ok\u002fFILL_DATA.length;\n  document.getElementById('fill-score-stars').textContent = pct\u003e=0.9?'⭐⭐⭐':pct\u003e=0.7?'⭐⭐':pct\u003e=0.5?'⭐':'☆';\n}\n\nfunction resetFill(){\n  document.querySelectorAll('.fill-input').forEach(inp=\u003e{ inp.value=''; inp.classList.remove('correct','wrong'); });\n  document.querySelectorAll('.fill-item').forEach(it=\u003eit.classList.remove('correct','wrong'));\n  document.querySelectorAll('.fill-feedback').forEach(fb=\u003e{ fb.className='fill-feedback'; fb.textContent=''; });\n  document.getElementById('fill-score-bar').style.display='none';\n}\n\nbuildFill();\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EX 2 — MCQ: choose verb form\n\u002f\u002f ══════════════════════════════════════════\nconst MCQ_DATA = [\n  {\n    context: 'Alex, строка 1',\n    q: 'Hi! ___ you work on Monday?',\n    opts: ['Do','Does','Did','Will'],\n    correct: 'Do',\n    explain: 'Present Simple вопрос: you\u002fI\u002fwe\u002fthey → Do + подлежащее + base form'\n  },\n  {\n    context: 'Mary, строка 2',\n    q: 'Yes, I do. I ___ after lunch.',\n    opts: ['work','works','worked','working'],\n    correct: 'work',\n    explain: 'Present Simple: I → base form без окончания -s'\n  },\n  {\n    context: 'Alex, строка 3',\n    q: 'What ___ you do after work?',\n    opts: ['do','does','did','will'],\n    correct: 'do',\n    explain: 'Present Simple вопрос: you → Do + подлежащее + base form'\n  },\n  {\n    context: 'Mary, строка 4',\n    q: 'I ___ every day.',\n    opts: ['train','trains','trained','training'],\n    correct: 'train',\n    explain: 'Present Simple: I → base form без окончания -s'\n  },\n  {\n    context: 'Alex, строка 5',\n    q: 'Where ___ you train?',\n    opts: ['do','does','did','will'],\n    correct: 'do',\n    explain: 'Present Simple вопрос: you → Do + подлежащее + base form'\n  },\n  {\n    context: 'Mary, строка 8',\n    q: 'We ___ on Sunday.',\n    opts: ['meet','meets','met','meeting'],\n    correct: 'meet',\n    explain: 'Present Simple: we → base form без окончания -s'\n  },\n  {\n    context: 'Alex, строка 9',\n    q: 'I like to read and to ___ interesting films.',\n    opts: ['watch','watches','watched','watching'],\n    correct: 'watch',\n    explain: 'После to (инфинитив) глагол всегда в base form'\n  },\n];\n\nfunction buildMcq(){\n  const list = document.getElementById('mcq-list');\n  list.innerHTML = '';\n  MCQ_DATA.forEach((d,i)=\u003e{\n    const div = document.createElement('div');\n    div.className = 'mcq-item';\n    div.id = `mcq-${i}`;\n    const opts = d.opts.map(o=\u003e`\u003cbutton class=\"mcq-opt\" id=\"mcq-opt-${i}-${o.replace(\u002f\\s\u002fg,'_')}\" onclick=\"pickMcq(${i},'${o}')\"\u003e${o}\u003c\u002fbutton\u003e`).join('');\n    div.innerHTML = `\n      \u003cdiv class=\"mcq-context\"\u003e${d.context}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"mcq-q\"\u003e${d.q}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"mcq-opts\"\u003e${opts}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"mcq-feedback\" id=\"mcq-fb-${i}\"\u003e\u003c\u002fdiv\u003e\n    `;\n    list.appendChild(div);\n  });\n}\n\nlet mcqAnswered = new Array(MCQ_DATA.length).fill(false);\nlet mcqScore = 0;\n\nfunction pickMcq(i, chosen){\n  if(mcqAnswered[i]) return;\n  mcqAnswered[i] = true;\n  const d = MCQ_DATA[i];\n  const item = document.getElementById(`mcq-${i}`);\n  const fb = document.getElementById(`mcq-fb-${i}`);\n  item.querySelectorAll('.mcq-opt').forEach(b=\u003eb.disabled=true);\n  if(chosen === d.correct){\n    mcqScore++;\n    item.classList.add('correct');\n    item.querySelector(`#mcq-opt-${i}-${chosen.replace(\u002f\\s\u002fg,'_')}`).classList.add('correct');\n    fb.className = 'mcq-feedback ok';\n    fb.textContent = '✓ Верно! ' + d.explain;\n  } else {\n    item.classList.add('wrong');\n    item.querySelector(`#mcq-opt-${i}-${chosen.replace(\u002f\\s\u002fg,'_')}`).classList.add('wrong');\n    const corrBtn = item.querySelector(`#mcq-opt-${i}-${d.correct.replace(\u002f\\s\u002fg,'_')}`);\n    if(corrBtn) corrBtn.classList.add('correct');\n    fb.className = 'mcq-feedback no';\n    fb.textContent = `✗ Правильно: ${d.correct} — ${d.explain}`;\n  }\n  \u002f\u002f show score after all answered\n  if(mcqAnswered.every(Boolean)){\n    const bar = document.getElementById('mcq-score-bar');\n    bar.style.display = 'flex';\n    document.getElementById('mcq-score-num').textContent = `${mcqScore}\u002f${MCQ_DATA.length}`;\n    const pct = mcqScore\u002fMCQ_DATA.length;\n    document.getElementById('mcq-score-stars').textContent = pct\u003e=0.9?'⭐⭐⭐':pct\u003e=0.7?'⭐⭐':pct\u003e=0.5?'⭐':'☆';\n    bar.scrollIntoView({behavior:'smooth',block:'nearest'});\n  }\n}\n\nfunction resetMcq(){\n  mcqAnswered = new Array(MCQ_DATA.length).fill(false);\n  mcqScore = 0;\n  document.getElementById('mcq-score-bar').style.display='none';\n  buildMcq();\n}\n\nbuildMcq();\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EX 3 — VERB FINDER\n\u002f\u002f ══════════════════════════════════════════\nconst VF_LINES = [\n  { speaker:'Alex', text:'Hi! Do you work on Monday?', pastVerbs:['work'] },\n  { speaker:'Mary', text:'Yes, I do. I work after lunch.', pastVerbs:['work'] },\n  { speaker:'Alex', text:'What do you do after work?', pastVerbs:['do'] },\n  { speaker:'Mary', text:'I train every day. Do you like sport?', pastVerbs:['train'] },\n  { speaker:'Alex', text:'Yes, I do. I train on weekends. Where do you train?', pastVerbs:['train','train'] },\n  { speaker:'Mary', text:'I train in the fitness club.', pastVerbs:['train'] },\n  { speaker:'Mary', text:'Yes, I do. We meet on Sunday. Do you like to read?', pastVerbs:['meet'] },\n  { speaker:'Alex', text:'Yes, I do. I like to read and to watch interesting films in the evening.', pastVerbs:['like','read','watch'] },\n];\n\n\u002f\u002f All past simple verbs across lines (normalised)\nconst ALL_PAST = ['did','worked','trained','met','read'];\n\nfunction buildVF(){\n  const container = document.getElementById('vf-lines');\n  container.innerHTML = '';\n  VF_LINES.forEach((l,li)=\u003e{\n    const div = document.createElement('div');\n    div.className = 'vf-line';\n    const words = l.text.split(\u002f(\\s+|(?=[.,!?])|(?\u003c=[.,!?]))\u002f);\n    const spans = words.map((w,wi)=\u003e{\n      const clean = w.replace(\u002f[^a-zA-Z']\u002fg,'').toLowerCase();\n      const isPast = l.pastVerbs.map(v=\u003ev.toLowerCase()).includes(clean) && \u002f[a-zA-Z]\u002f.test(w);\n      if(!isPast || !\u002f[a-zA-Z]\u002f.test(w)) return `\u003cspan\u003e${w}\u003c\u002fspan\u003e`;\n      return `\u003cspan class=\"vf-word\" data-li=\"${li}\" data-wi=\"${wi}\" data-correct=\"1\" onclick=\"toggleVFWord(this)\"\u003e${w}\u003c\u002fspan\u003e`;\n    }).join('');\n    \u002f\u002f Also make non-past words clickable to catch wrong selections\n    const allSpans = l.text.split(' ').map((w,wi)=\u003e{\n      const clean = w.replace(\u002f[^a-zA-Z']\u002fg,'').toLowerCase();\n      const isPast = l.pastVerbs.map(v=\u003ev.toLowerCase()).includes(clean);\n      if(isPast){\n        return `\u003cspan class=\"vf-word\" data-li=\"${li}\" data-wi=\"${wi}\" data-correct=\"1\" onclick=\"toggleVFWord(this)\"\u003e${w}\u003c\u002fspan\u003e`;\n      }\n      return `\u003cspan class=\"vf-word\" data-li=\"${li}\" data-wi=\"${wi}\" data-correct=\"0\" onclick=\"toggleVFWord(this)\"\u003e${w}\u003c\u002fspan\u003e`;\n    }).join(' ');\n    div.innerHTML = `\u003cdiv class=\"vf-speaker\"\u003e${l.speaker}\u003c\u002fdiv\u003e\u003cdiv class=\"vf-text\"\u003e${allSpans}\u003c\u002fdiv\u003e`;\n    container.appendChild(div);\n  });\n}\n\nfunction toggleVFWord(el){\n  el.classList.toggle('selected');\n  if(!el.classList.contains('selected')){\n    el.classList.remove('selected-ok','selected-no');\n  }\n}\n\nfunction checkVF(){\n  let found = 0, wrong = 0, total = VF_LINES.reduce((s,l)=\u003es+l.pastVerbs.length,0);\n  document.querySelectorAll('.vf-word').forEach(el=\u003e{\n    const isCorrect = el.dataset.correct === '1';\n    const isSelected = el.classList.contains('selected');\n    el.classList.remove('selected','selected-ok','selected-no');\n    if(isSelected){\n      if(isCorrect){ el.classList.add('selected-ok'); found++; }\n      else { el.classList.add('selected-no'); wrong++; }\n    }\n  });\n  const bar = document.getElementById('vf-score-bar');\n  bar.style.display = 'flex';\n  document.getElementById('vf-score-num').textContent = `${found}\u002f${total} (лишних: ${wrong})`;\n  const pct = wrong===0 ? found\u002ftotal : Math.max(0,(found-wrong)\u002ftotal);\n  document.getElementById('vf-score-stars').textContent = pct\u003e=0.9?'⭐⭐⭐':pct\u003e=0.7?'⭐⭐':pct\u003e=0.5?'⭐':'☆';\n}\n\nfunction resetVF(){\n  document.getElementById('vf-score-bar').style.display='none';\n  buildVF();\n}\n\nbuildVF();\n\u003c\u002fscript\u003e\n\u003c\u002fbody\u003e\n\u003c\u002fhtml\u003e\n";


function openDialogue(tense){
  stopTimer();
  const T = TENSES[tense];
  setAccent(T.color);
  document.getElementById('quiz-header').style.background = T.color;
  document.getElementById('quiz-back-btn').onclick = ()=>openTense(tense);
  document.getElementById('quiz-title').textContent = 'Диалог: Alex & Mary';
  // Hide HUD elements not needed
  document.getElementById('prog').style.width='0%';
  document.getElementById('hud-cur').textContent='—';
  document.getElementById('hud-ok').textContent='—';
  document.getElementById('hud-err').textContent='—';
  document.getElementById('hud-tot').textContent='—';
  document.getElementById('streak-badge').style.display='none';
  document.getElementById('timer-chip').style.display='none';
  document.querySelector('.xp-bar-wrap').style.display='none';

  document.getElementById('main').innerHTML = `
    <div style="margin:-1rem -1rem 0;border-radius:0;">
      <iframe id="dialogue-frame"
        style="width:100%;height:85vh;border:none;border-radius:0 0 16px 16px;display:block;"
        srcdoc=""
        allow="autoplay">
      </iframe>
    </div>`;

  // Set srcdoc after insert to avoid escaping issues
  document.getElementById('dialogue-frame').srcdoc = tense==='fut' ? DIALOGUE_FUTURE_HTML : tense==='pres' ? DIALOGUE_PRESENT_HTML : DIALOGUE_HTML;
  showScreen('quiz-screen');
}

function closeDialogue(tense){
  document.getElementById('streak-badge').style.display='';
  document.getElementById('timer-chip').style.display='';
  document.querySelector('.xp-bar-wrap').style.display='';
  openTense(tense||'past');
}

_dbg.id = '_debug';
