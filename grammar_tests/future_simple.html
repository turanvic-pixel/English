<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Simple</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F0E8; --card: #FFFDF8; --text: #1A1A1A; --muted: #6B6B5E; --border: #D8D0C0;
  --green: #1E6B3A; --green-bg: #E4F2EB; --red: #A32D2D; --red-bg: #FCEBEB;
  --c-past: #2D5A3D; --c-pres: #1A4A7A; --c-fut: #6B2FA0; --c-mix: #2C3E6B;
  --accent: #2D5A3D;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }

/* ── SCREENS ── */
#root-hub, #tense-hub, #quiz-screen { display: none !important; }
#root-hub.active { display: flex !important; flex-direction: column; min-height: 100vh; }
#tense-hub.active { display: flex !important; flex-direction: column; min-height: 100vh; }
#quiz-screen.active { display: block !important; }

/* ── ROOT HUB ── */
.root-header { color: #fff; padding: 3rem 1.5rem 2rem; text-align: center; }
.root-header h1 { font-family: 'Fraunces', serif; font-size: clamp(1.8rem, 7vw, 2.8rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
.root-header p  { font-size: 0.9rem; opacity: 0.75; }

.hub-body { flex: 1; max-width: 620px; margin: 0 auto; padding: 2rem 1.5rem 4rem; width: 100%; }
.hub-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.1rem; }

/* Tense cards on root */
.tense-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.tense-card {
  border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1rem;
  cursor: pointer; text-align: left; background: var(--card);
  font-family: 'DM Sans', sans-serif; transition: transform 0.13s, box-shadow 0.13s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04); color: var(--text);
  -webkit-tap-highlight-color: rgba(0,0,0,0.05); touch-action: manipulation;
}
.tense-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.09); }
.tense-card-icon { font-size: 1.6rem; margin-bottom: 0.5rem; }
.tense-card-title { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 600; margin-bottom: 2px; line-height: 1.2; }
.tense-card-sub { font-size: 0.76rem; color: var(--muted); }
.tense-card-arrow { color: var(--muted); font-size: 0.9rem; display: block; text-align: right; margin-top: 0.3rem; }

.tc-past { border-top: 3px solid var(--c-past); }
.tc-pres { border-top: 3px solid var(--c-pres); }
.tc-fut  { border-top: 3px solid var(--c-fut);  }

/* Mixed cards — full width */
.mixed-cards { display: flex; flex-direction: column; gap: 12px; }
.quiz-btn {
  display: flex; align-items: center; gap: 1.1rem; width: 100%;
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 1.25rem 1.5rem; cursor: pointer; text-align: left;
  font-family: 'DM Sans', sans-serif; transition: transform 0.13s, box-shadow 0.13s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04); color: var(--text);
  -webkit-tap-highlight-color: rgba(0,0,0,0.05); touch-action: manipulation;
}
.quiz-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.09); }
.quiz-btn-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
.icon-mix1 { background: #E8EAF6; }
.icon-mix2 { background: #EDE0FA; }
.quiz-btn-title { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 600; margin-bottom: 2px; }
.quiz-btn-sub   { font-size: 0.78rem; color: var(--muted); }
.quiz-btn-arrow { margin-left: auto; font-size: 1rem; color: var(--muted); flex-shrink: 0; }
.quiz-btn.tc-mix { border-top: 3px solid var(--c-mix); }

/* ── TENSE HUB ── */
.tense-hub-header { color: #fff; padding: 1.5rem 1.5rem 1.25rem; display: flex; align-items: center; gap: 1rem; }
.back-btn { background: rgba(255,255,255,0.15); border: none; border-radius: 8px; color: #fff; font-size: 0.95rem; cursor: pointer; padding: 6px 12px; font-family: 'DM Sans', sans-serif; flex-shrink: 0; transition: background 0.12s; }
.back-btn:hover { background: rgba(255,255,255,0.25); }
.tense-hub-header h2 { font-family: 'Fraunces', serif; font-size: clamp(1.1rem, 4vw, 1.5rem); font-weight: 700; letter-spacing: -0.01em; }

.section-btn {
  display: flex; align-items: center; gap: 1.1rem; width: 100%;
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 1.25rem 1.5rem; margin-bottom: 10px; cursor: pointer; text-align: left;
  font-family: 'DM Sans', sans-serif; transition: transform 0.13s, box-shadow 0.13s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04); color: var(--text);
  -webkit-tap-highlight-color: rgba(0,0,0,0.05); touch-action: manipulation;
}
.section-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.09); }
.sb-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.icon-g { background: var(--green-bg); } .icon-b { background: #E8F0FB; }
.icon-a { background: #FFF3DC; } .icon-r { background: #FCEBEB; }
.icon-p { background: #F0EAF8; }
.sb-title { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 600; margin-bottom: 2px; }
.sb-sub { font-size: 0.78rem; color: var(--muted); }
.sb-arrow { margin-left: auto; font-size: 1rem; color: var(--muted); flex-shrink: 0; }

/* ── QUIZ ── */
.quiz-header { color: #fff; padding: 1.1rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
.quiz-header h3 { font-family: 'Fraunces', serif; font-size: clamp(0.9rem, 3.5vw, 1.25rem); font-weight: 700; line-height: 1.2; }

.hud { display: flex; justify-content: center; gap: 0.75rem; padding: 0.8rem 1.5rem; flex-wrap: wrap; }
.hud-chip { background: var(--card); border: 1px solid var(--border); border-radius: 100px; padding: 5px 16px; font-size: 0.82rem; display: flex; align-items: center; gap: 5px; }
.hud-chip b { font-weight: 600; }

.progress-wrap { padding: 0 1.5rem 1rem; max-width: 680px; margin: 0 auto; }
.progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill  { height: 100%; border-radius: 3px; transition: width 0.45s cubic-bezier(.4,0,.2,1); }

main { max-width: 680px; margin: 0 auto; padding: 0 1.5rem 4rem; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.task-type { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.55rem; }
.sentence-main { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 600; line-height: 1.45; margin-bottom: 1.2rem; color: var(--text); }

.options      { display: flex; flex-direction: column; gap: 8px; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.opt { border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; cursor: pointer; font-size: 0.95rem; background: transparent; text-align: left; color: var(--text); font-family: 'DM Sans', sans-serif; transition: background 0.12s, border-color 0.12s, transform 0.1s; }
.opt:hover:not(:disabled) { background: var(--bg); border-color: #AAA090; transform: translateX(3px); }
.opt.correct { background: var(--green-bg); border-color: var(--green); color: var(--green); font-weight: 500; }
.opt.wrong   { background: var(--red-bg);   border-color: var(--red);   color: var(--red); }

.answer-zone { border: 1.5px dashed var(--border); border-radius: 10px; padding: 10px; min-height: 52px; background: var(--bg); display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.words-pool  { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; min-height: 40px; }
.word-chip { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; font-size: 0.9rem; cursor: pointer; transition: background 0.12s, transform 0.1s; font-family: 'DM Sans', sans-serif; user-select: none; }
.word-chip:hover { background: var(--bg); transform: translateY(-2px); }
.word-chip.used { opacity: 0.2; pointer-events: none; }
.word-chip.in-answer { color: #fff; }
.zone-label { font-size: 0.74rem; color: var(--muted); margin-bottom: 4px; }

.feedback { margin-top: 12px; font-size: 0.9rem; font-weight: 500; min-height: 20px; display: flex; align-items: center; gap: 6px; }
.feedback.ok { color: var(--green); }
.feedback.no { color: var(--red); }

.btn-row { display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }
.btn { padding: 10px 22px; border-radius: 10px; border: 1px solid var(--border); background: transparent; font-size: 0.92rem; font-family: 'DM Sans', sans-serif; cursor: pointer; color: var(--text); transition: background 0.12s; }
.btn:hover { background: var(--bg); }
.btn-primary { color: #fff; border: none; }
.btn-primary:hover { filter: brightness(0.88); }
.btn-primary:disabled { opacity: 0.35; cursor: default; }

.score-screen { text-align: center; padding: 2rem 1rem; }
.score-circle { width: 130px; height: 130px; border-radius: 50%; background: var(--green-bg); border: 3px solid var(--green); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
.score-big   { font-family: 'Fraunces', serif; font-size: 2.4rem; font-weight: 700; color: var(--green); }
.score-of    { font-size: 0.78rem; color: var(--muted); }
.score-title { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 600; margin-bottom: 0.4rem; }
.score-sub   { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }

.section-title { font-weight: 500; font-size: 1rem; margin-bottom: 1rem; }
.result-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
.result-item:last-child { border-bottom: none; }
.result-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.result-type { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
.result-q    { color: var(--muted); }
.result-a    { font-weight: 500; }
.result-wrong { color: var(--red); font-size: 0.82rem; margin-top: 2px; }

/* Tense tag in result */
.t-tag { display: inline-block; font-size: 0.65rem; padding: 1px 7px; border-radius: 5px; border: 1px solid; font-weight: 500; margin-bottom: 2px; }
.t-past { background: #E4F0EA; color: var(--c-past); border-color: #9ACBAE; }
.t-pres { background: #E4EEF8; color: var(--c-pres); border-color: #A0BFE8; }
.t-fut  { background: #F0EAF8; color: var(--c-fut);  border-color: #C8A8E8; }

.grammar-table { width:100%; border-collapse:collapse; font-size:0.88rem; margin-top:1rem; }
.grammar-table th { color:#fff; padding:7px 12px; text-align:left; font-weight:500; }
.grammar-table td { padding:7px 12px; border-bottom:1px solid var(--border); }
.grammar-table tbody tr:last-child td { border-bottom:none; }

/* ── GAMIFICATION ── */
/* XP bar */
.xp-bar-wrap { padding: 0 1.5rem 0.5rem; max-width: 680px; margin: 0 auto; display:flex; align-items:center; gap:10px; }
.xp-label { font-size:0.72rem; color:var(--muted); white-space:nowrap; font-weight:500; }
.xp-track { flex:1; height:6px; background:var(--border); border-radius:4px; overflow:hidden; }
.xp-fill { height:100%; border-radius:4px; background: linear-gradient(90deg, #f59e0b, #ef4444); transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.xp-val { font-size:0.78rem; font-weight:700; color:#ef4444; min-width:40px; text-align:right; }

/* Timer chip */
.timer-chip { background:var(--card); border:1px solid var(--border); border-radius:100px; padding:5px 16px; font-size:0.82rem; display:flex; align-items:center; gap:5px; transition: background 0.3s, border-color 0.3s; }
.timer-chip.warning { background:#fff3dc; border-color:#f59e0b; }
.timer-chip.danger  { background:#fcebeb; border-color:#ef4444; }
.timer-chip b { font-weight:700; font-variant-numeric: tabular-nums; }

/* Streak badge */
.streak-badge { display:inline-flex; align-items:center; gap:4px; background:var(--card); border:1px solid var(--border); border-radius:100px; padding:5px 14px; font-size:0.82rem; font-weight:600; transition: all 0.3s; }
.streak-badge.hot { background:#fff3dc; border-color:#f59e0b; color:#b45309; }
.streak-badge.fire { background: linear-gradient(135deg,#fef3c7,#fde68a); border-color:#f59e0b; color:#92400e; animation: streakPulse 0.5s ease; }

@keyframes streakPulse {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.18); }
  100% { transform: scale(1); }
}

/* Hint button */
.hint-btn { border:1px solid var(--border); border-radius:8px; padding:7px 14px; background:transparent; font-size:0.82rem; cursor:pointer; color:var(--muted); font-family:'DM Sans',sans-serif; display:flex; align-items:center; gap:5px; transition: background 0.12s; }
.hint-btn:hover:not(:disabled) { background:var(--bg); }
.hint-btn:disabled { opacity:0.35; cursor:default; }

/* XP popup float */
.xp-popup { position:fixed; pointer-events:none; font-weight:700; font-size:1rem; border-radius:12px; padding:4px 14px; z-index:9999; animation: floatUp 1s ease forwards; }
.xp-popup.ok { background:#E4F2EB; color:#1E6B3A; }
.xp-popup.bonus { background:#fef3c7; color:#92400e; }
.xp-popup.err { background:#FCEBEB; color:#A32D2D; }
@keyframes floatUp {
  0%   { opacity:1; transform: translateY(0); }
  80%  { opacity:1; }
  100% { opacity:0; transform: translateY(-60px); }
}

/* Score screen upgrades */
.stars-row { display:flex; justify-content:center; gap:6px; font-size:2rem; margin:0.4rem 0 0.6rem; }
.star { transition: transform 0.3s; display:inline-block; filter: grayscale(1) opacity(0.3); }
.star.lit { filter: none; animation: starPop 0.4s ease; }
@keyframes starPop {
  0%   { transform: scale(0.5) rotate(-20deg); }
  70%  { transform: scale(1.25) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); }
}

.rank-badge { display:inline-block; padding:4px 18px; border-radius:100px; font-size:0.78rem; font-weight:700; letter-spacing:0.05em; margin-bottom:0.5rem; }

.confetti-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9998; }

/* Record chip on hub */
.record-chip { font-size:0.7rem; color:var(--muted); display:flex; align-items:center; gap:3px; margin-top:3px; }
.record-chip .stars-s { color:#f59e0b; font-size:0.65rem; }

/* Retry errors button */
.btn-retry { background:#fff3dc; border-color:#f59e0b; color:#92400e; }
.btn-retry:hover { background:#fde68a; }

/* ── TABS on root hub ── */
.hub-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:1.5rem; }
/* ── TIMER TOGGLE ── */
.timer-toggle-row { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 16px; margin-bottom:1.2rem; }
.timer-toggle-label { flex:1; font-size:0.85rem; font-weight:500; color:var(--text); }
.timer-toggle-sub { font-size:0.72rem; color:var(--muted); display:block; margin-top:2px; }
.toggle-switch { position:relative; width:44px; height:24px; flex-shrink:0; }
.toggle-switch input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:var(--border); border-radius:99px; cursor:pointer; transition:background .25s; }
.toggle-slider:before { content:''; position:absolute; width:18px; height:18px; left:3px; top:3px; background:#fff; border-radius:50%; transition:transform .25s; box-shadow:0 1px 4px rgba(0,0,0,.2); }
.toggle-switch input:checked + .toggle-slider { background:var(--accent); }
.toggle-switch input:checked + .toggle-slider:before { transform:translateX(20px); }

.hub-tab { flex:1; background:none; border:none; padding:10px 0; font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:color 0.15s, border-color 0.15s; }
.hub-tab.active { color:var(--text); border-bottom-color: #2C3E6B; font-weight:600; }
.hub-tab:hover:not(.active) { color:var(--text); }
.hub-tab-panel { display:none; }
.hub-tab-panel.active { display:block; }

/* Rewards panel */
.rewards-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.reward-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1rem; }
.reward-icon { font-size:1.5rem; margin-bottom:6px; }
.reward-title { font-family:'Fraunces',serif; font-size:0.9rem; font-weight:600; margin-bottom:4px; }
.reward-desc { font-size:0.75rem; color:var(--muted); line-height:1.5; }
.reward-rows { display:flex; flex-direction:column; gap:8px; }
.reward-row { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:0.75rem 1rem; display:flex; align-items:center; gap:12px; }
.reward-row-icon { font-size:1.3rem; flex-shrink:0; }
.reward-row-body { flex:1; }
.reward-row-title { font-size:0.88rem; font-weight:600; margin-bottom:2px; }
.reward-row-desc { font-size:0.75rem; color:var(--muted); line-height:1.5; }
.reward-row-val { font-size:0.82rem; font-weight:700; color:#ef4444; flex-shrink:0; }
.rewards-section-label { font-size:0.7rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin:1.1rem 0 0.6rem; }
.rank-row { display:flex; flex-direction:column; gap:6px; }
.rank-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:10px; background:var(--card); border:1px solid var(--border); }
.rank-item-badge { padding:2px 12px; border-radius:100px; font-size:0.72rem; font-weight:700; }
.rank-item-pct { font-size:0.78rem; color:var(--muted); margin-left:auto; }

.send-status { margin-top: 10px; font-size: 13px; font-weight: 600; min-height: 20px; }
.send-status.ok { color: #14532d; }
.send-status.err { color: #7f1d1d; }
.name-input-4t { padding: 9px 14px; border-radius: 8px; border: 1.5px solid #c8dff7; font-size: 14px; width: 100%; box-sizing: border-box; margin-bottom: 8px; font-family: Arial, sans-serif; }
.name-input-4t.err { border-color: #ef4444; }

#timer-status { min-height: 18px; }
#timer-status.timer-on  { color: #b45309; }
#timer-status.timer-off { color: #6b7280; }

  .warn-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:9000; align-items:center; justify-content:center; padding:1rem; }
  .warn-overlay.open { display:flex; }
  .warn-box { background:#fff; border-radius:16px; padding:2rem 1.5rem; max-width:360px; width:100%; text-align:center; }
  .warn-icon { font-size:3rem; margin-bottom:.8rem; }
  .warn-title { font-size:18px; font-weight:700; color:#b91c1c; margin-bottom:.6rem; }
  .warn-text { font-size:14px; color:#1a2e4a; line-height:1.6; margin-bottom:1.2rem; }
  .warn-count { font-size:13px; font-weight:700; color:#b91c1c; background:#fee2e2; border-radius:8px; padding:6px 14px; display:inline-block; margin-bottom:1.2rem; }
  .warn-btn { padding:10px 28px; border-radius:10px; border:none; background:#378ADD; color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:Arial,sans-serif; }
  .warn-btn.danger { background:#ef4444; }

  .result-grade { font-size: 1.5rem; font-weight: 800; margin: .3rem 0 .5rem; padding: .3rem 1.2rem; border-radius: 12px; display: inline-block; }
  .grade-5 { background: #d1fae5; color: #065f46; }
  .grade-4 { background: #dbeafe; color: #1e40af; }
  .grade-3 { background: #fef3c7; color: #92400e; }
  .grade-2 { background: #fee2e2; color: #b91c1c; }
  .grade-1 { background: #f3f4f6; color: #6b7280; }
</style>
<style>
.reg-form { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.2rem; }
.reg-form h3 { font-family:'Fraunces',serif; font-size:1rem; margin-bottom:1rem; color:var(--text); }
.reg-input { width:100%; border:1.5px solid var(--border); border-radius:10px; padding:10px 14px; font-size:0.95rem; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); margin-bottom:0.6rem; outline:none; }
.reg-input:focus { border-color:#6B2FA0; }
</style>
</head>
<body>
<canvas id="confetti-canvas" class="confetti-canvas" style="display:none"></canvas>
<div id="root-hub" class="active">

function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width, y:Math.random()*-canvas.height,
    r:Math.random()*6+3, c:['#f59e0b','#10b981','#3b82f6','#ef4444','#8b5cf6','#ec4899'][Math.floor(Math.random()*6)],
    vx:(Math.random()-0.5)*4, vy:Math.random()*4+2, rot:Math.random()*360, vr:(Math.random()-0.5)*8
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.c; ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
    });
    frame++;
    if(frame<120) requestAnimationFrame(draw);
    else{ ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none'; }
  }
  draw();
}

    ...shuffle(byT.past).slice(0,10),
    ...shuffle(byT.pres).slice(0,10),
    ...shuffle(byT.fut).slice(0,10),
  ]);
}

function buildAndStart30(){
  activeTenseTag = true;
  TOTAL=30;
  activeGrammar = `<table class="grammar-table"><thead><tr>
    <th style="background:var(--c-past)">Past</th>
    <th style="background:var(--c-pres)">Present</th>
    <th style="background:var(--c-fut)">Future</th>
    </tr></thead><tbody>
    <tr><td>studied/swam/left</td><td>study/studies·swim/swims</td><td>will study/swim</td></tr>
    <tr><td>Did+подл.+V₁?</td><td>Do/Does+подл.+V₁?</td><td>Will+подл.+V₁?</td></tr>
    <tr><td>didn't+V₁</td><td>don't/doesn't+V₁</td><td>won't+V₁</td></tr>
    </tbody></table>`;
  startQuiz(pick30());
}

function startQuiz(qs){
  violations = 0; testActive = true;
  questions=qs; cur=0; score=0; errors=0; answered=false; results=[]; answerArr=[];
  xp=0; streak=0; hints=3;
  updateXpUI(); updateStreakUI();
  document.getElementById('hud-tot').textContent=TOTAL;
  updateHud(); render();
}

function updateHud(){
  document.getElementById('hud-cur').textContent=cur+1;
  document.getElementById('hud-ok').textContent=score;
  document.getElementById('hud-err').textContent=errors;
  document.getElementById('prog').style.width=(cur/TOTAL*100)+'%';
}

function render(){
  if(cur>=TOTAL){showScore();return;}
  answered=false; answerArr=[];
  hints=Math.min(hints+0, 3); // keep hints as-is between questions
  updateHud();
  const q=questions[cur];
  document.getElementById('main').innerHTML=q.type==='mcq'?renderMCQ(q):renderOrder(q);
  questionStartTime=Date.now();
  if(timerEnabled) startTimer(); else { stopTimer(); const chip=document.getElementById('timer-chip'); if(chip) chip.style.display='none'; }
  updateHintBtn();
}

function renderMCQ(q){
  const opts=(q.options||shuffle([q.a,...q.w]));
  const grid=opts.every(o=>o.split(' ').length<=4);
  const cls=grid?'options-grid':'options';
  const os=opts.map(o=>`<button class="opt" onclick="pickMCQ(this,'${esc(o)}','${esc(q.correct||q.a)}')">${o}</button>`).join('');
  const disp=(q.display||q.q).replace(/\n/g,'<br>');
  return `<div class="card">
    <div class="task-type">${q.label}</div>
    <div class="sentence-main">${disp}</div>
    <div class="${cls}">${os}</div>
    <div class="feedback" id="fb"></div>
    <div class="btn-row">
      <button class="hint-btn" id="hint-btn" onclick="useHint()">💡 Подсказка (${hints})</button>
      <button class="btn btn-primary" id="nxt" onclick="next()" disabled style="background:var(--accent)">Следующий →</button>
    </div>
  </div>`;
}

function renderOrder(q){
  const ws=q.shuffled||q.words;
  const chips=ws.map((w,i)=>`<span class="word-chip" id="wc-${i}" onclick="pickWord('${esc(w)}',${i})">${w}</span>`).join('');
  return `<div class="card">
    <div class="task-type">${q.label}</div>
    <div class="sentence-main">${q.display||q.q}</div>
    <div class="zone-label">Ваш ответ:</div>
    <div class="answer-zone" id="answer-zone"></div>
    <div class="zone-label">Слова:</div>
    <div class="words-pool">${chips}</div>
    <div class="feedback" id="fb"></div>
    <div class="btn-row">
      <button class="btn" onclick="clearOrder()">Очистить</button>
      <button class="btn btn-primary" id="check-btn" onclick="checkOrder()" style="background:var(--accent)">Проверить</button>
      <button class="btn btn-primary" id="nxt" onclick="next()" style="display:none;background:var(--accent)">Следующий →</button>
    </div>
  </div>`;
}

function pickMCQ(btn,chosen,correct){
  if(answered)return;
  answered=true;
  stopTimer();
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  const ok=chosen===correct;
  const elapsed=(Date.now()-questionStartTime)/1000;
  if(ok){
    btn.classList.add('correct');
    streak++;
    const fast=elapsed<5;
    const streakBonus=streak>=3?3:0;
    const base=10, fastBonus=fast?5:0;
    const gained=base+fastBonus+streakBonus;
    fb.innerHTML=`✓ Верно!${fast?' ⚡ Быстро!':''}${streakBonus>0?' 🔥 Серия!':''}`;
    fb.className='feedback ok';
    score++;
    addXP(gained, fast&&streakBonus>0?'bonus':'ok');
    if(streakBonus>0 && streak%3===0){
      // extra XP popup for streak
      setTimeout(()=>addXP(0,'bonus'),0);
    }
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(b=>{ if(b.textContent.trim()===correct) b.classList.add('correct'); });
    fb.innerHTML=`✗ Правильно: <em>${correct}</em>`;
    fb.className='feedback no';
    streak=0;
    errors++;
  }
  updateStreakUI();
  const q=questions[cur];
  results.push({tense:q.tense||null,label:q.label,q:q.display||q.q,a:q.correct||q.a,userA:chosen,ok});
  document.getElementById('nxt').disabled=false;
  updateHud();
}

function pickWord(word,idx){
  if(answered)return;
  answerArr.push({word,idx});
  document.getElementById('wc-'+idx).classList.add('used');
  const zone=document.getElementById('answer-zone');
  const span=document.createElement('span');
  span.className='word-chip in-answer';
  span.style.background=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  span.textContent=word;
  span.onclick=()=>removeWord(word,idx,span);
  zone.appendChild(span);
}

function removeWord(word,idx,span){
  if(answered)return;
  answerArr=answerArr.filter(a=>!(a.word===word&&a.idx===idx));
  span.remove();
  const c=document.getElementById('wc-'+idx);if(c)c.classList.remove('used');
}

function clearOrder(){
  if(answered)return;
  answerArr=[];
  document.getElementById('answer-zone').innerHTML='';
  document.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('used'));
}

function checkOrder(){
  if(answered)return;
  stopTimer();
  const q=questions[cur];
  const user=answerArr.map(a=>a.word).join(' ');
  const correct=(q.correct||q.words).join(' ');
  answered=true;
  const fb=document.getElementById('fb');
  document.getElementById('check-btn').style.display='none';
  document.getElementById('nxt').style.display='inline-block';
  const ok=user===correct;
  const elapsed=(Date.now()-questionStartTime)/1000;
  if(ok){
    fb.innerHTML='✓ Верно!'+(elapsed<8?' ⚡ Быстро!':'');
    fb.className='feedback ok';
    score++;
    streak++;
    const streakBonus=streak>=3?3:0;
    const fastBonus=elapsed<8?5:0;
    addXP(10+fastBonus+streakBonus, fastBonus||streakBonus?'bonus':'ok');
  } else {
    fb.innerHTML=`✗ Правильно: <em>${correct}</em>`;
    fb.className='feedback no';
    streak=0;
    errors++;
  }
  updateStreakUI();
  results.push({tense:q.tense||null,label:q.label,q:q.display||q.q,a:correct,userA:user,ok});
  updateHud();
}

function next(){cur++;answerArr=[];if(cur>=TOTAL)showScore();else render();}

function calcStars(pct){
  return pct>=90?3:pct>=70?2:pct>=50?1:0;
}

function rankName(pct){
  if(pct>=90) return {name:'Мастер', color:'#8b5cf6', bg:'#ede9fe'};
  if(pct>=70) return {name:'Знаток', color:'#1A4A7A', bg:'#e4eef8'};
  if(pct>=50) return {name:'Ученик', color:'#2D5A3D', bg:'#e4f0ea'};
  return {name:'Новичок', color:'#6B2FA0', bg:'#f0eaf8'};
}

function retryErrors(){
  const wrong=results.filter(r=>!r.ok);
  if(!wrong.length) return;
  const qs=wrong.map(r=>{
    // reconstruct question from results
    const q=questions.find(q=>(q.display||q.q||q._q)===r.q);
    return q?JSON.parse(JSON.stringify(q)):null;
  }).filter(Boolean).map(q=>{
    if(q.type==='mcq') q.options=shuffle(q.options||[q.correct||q.a,...(q.w||[])]);
    if(q.type==='order') q.words=shuffle([...(q.correct||q.words||[])]);
    return q;
  });
  if(!qs.length) return;
  const savedTotal=TOTAL;
  TOTAL=qs.length;
  startQuiz(qs);
  TOTAL=qs.length;
  document.getElementById('hud-tot').textContent=TOTAL;
}

function showScore(){
  var _pct_disp = Math.round(score / (TOTAL||1) * 100);
  var _gr = _pct_disp>=90?'5 (Отлично)':_pct_disp>=75?'4 (Хорошо)':_pct_disp>=50?'3 (Удовл.)':_pct_disp>=10?'2 (Неудовл.)':'1 (Не зачтено)';
  var _grClass = _pct_disp>=90?'grade-5':_pct_disp>=75?'grade-4':_pct_disp>=50?'grade-3':_pct_disp>=10?'grade-2':'grade-1';
  var _grEl = document.getElementById('res-grade');
  if(_grEl){ _grEl.textContent = 'Оценка: ' + _gr; _grEl.className = 'result-grade ' + _grClass; }

  testActive = false;
  // Send to Google Forms
  var _name = (document.getElementById('inp-name') ? document.getElementById('inp-name').value.trim() : '') || 'Аноним';
  var _group = (document.getElementById('inp-group') ? document.getElementById('inp-group').value.trim() : '') || '—';
  sendToGoogleForms(_name, _group, 'Future Simple', score + '/' + TOTAL, 0, (typeof timerEnabled !== 'undefined' ? timerEnabled : false));

  stopTimer();
  document.getElementById('prog').style.width='100%';
  const pct=Math.round(score/TOTAL*100);
  const stars=calcStars(pct);
  const rank=rankName(pct);
  const msg=pct>=90?'Превосходно! 🎉':pct>=70?'Хорошая работа!':pct>=50?'Неплохо, продолжай!':'Нужно больше практики!';
  const wrong=results.filter(r=>!r.ok);

  // Save record
  const key=recordKey();
  const prev=getRecord(key);
  if(!prev||xp>prev.xp) saveRecord(key,{xp,stars,pct});

  // Launch confetti if 90%+
  if(pct>=90) setTimeout(launchConfetti,300);

  // Tense stats for mixed modes
  let statsHTML='';
  if(activeTenseTag){
    const byT={past:{ok:0,tot:0},pres:{ok:0,tot:0},fut:{ok:0,tot:0}};
    results.forEach(r=>{if(r.tense){byT[r.tense].tot++;if(r.ok)byT[r.tense].ok++;}});
    statsHTML=`<div style="display:flex;gap:8px;justify-content:center;margin:0.75rem 0;flex-wrap:wrap;">
      <span class="t-tag t-past">Past: ${byT.past.ok}/${byT.past.tot}</span>
      <span class="t-tag t-pres">Present: ${byT.pres.ok}/${byT.pres.tot}</span>
      <span class="t-tag t-fut">Future: ${byT.fut.ok}/${byT.fut.tot}</span>
    </div>`;
  }

  const wrongHTML=wrong.length===0
    ?`<p style="color:var(--green);font-weight:500;padding:0.75rem 0;">Все ответы верны! 🏆</p>`
    :wrong.map(r=>`<div class="result-item">
        <span class="result-icon">✗</span>
        <div>
          ${r.tense?`<span class="t-tag ${TENSE_TAG_MAP[r.tense]}">${TENSE_NAME_MAP[r.tense]}</span>`:''}
          <div class="result-type">${r.label}</div>
          <div class="result-q">${(r.q||'').replace(/\n/g,' / ')}</div>
          <div class="result-a">${r.a}</div>
          ${r.userA&&r.userA!==r.a?`<div class="result-wrong">Ваш ответ: ${r.userA}</div>`:''}
        </div>
      </div>`).join('');

  const SECTION_ORDER = ['affirmative','question','shortanswer','negative','special'];
  const curIdx = navState.section ? SECTION_ORDER.indexOf(navState.section) : -1;
  const nextSection = (curIdx >= 0 && curIdx < SECTION_ORDER.length - 1) ? SECTION_ORDER[curIdx + 1] : null;
  const nextBtn = (!navState.mixMode && nextSection)
    ? `<button class="btn btn-primary" onclick="startSection('${navState.tense}','${nextSection}')" style="background:var(--accent)">Следующая ступень →</button>`
    : '';

  const replayBtn = navState.mixMode==='30'
    ? `<button class="btn btn-primary" onclick="buildAndStart30()" style="background:var(--accent)">Новые 30 →</button>`
    : navState.mixMode==='sections'
    ? `<button class="btn btn-primary" onclick="buildAndStartMixed('${navState.section||'affirmative'}')" style="background:var(--accent)">Ещё раз</button>`
    : `<button class="btn btn-primary" onclick="buildAndStartSection('${navState.tense}','${navState.section}')" style="background:var(--accent)">Ещё раз</button>`;

  const backBtn = navState.mixMode
    ? `<button class="btn" onclick="${navState.mixMode==='sections'?'showMixedSectionsHub()':'goRoot()'}">← Назад</button>`
    : `<button class="btn" onclick="openTense('${navState.tense}')">← Разделы</button>`;

  const retryBtn = wrong.length>0
    ? `<button class="btn btn-retry" onclick="retryErrors()">🔁 Работа над ошибками (${wrong.length})</button>`
    : '';

  // Stars HTML with delayed animation
  const starsHTML=`<div class="stars-row">
    ${[1,2,3].map((i,idx)=>`<span class="star${stars>=i?' lit':''}" style="animation-delay:${idx*0.18}s">⭐</span>`).join('')}
  </div>`;

  document.getElementById('main').innerHTML=`
    <div class="card score-screen">
      <div id="res-grade" class="result-grade"></div>
      <div id="send-status" class="send-status"></div>
      <div id="timer-status"></div>
      <div class="score-circle"><div class="score-big">${score}</div><div class="score-of">из ${TOTAL}</div></div>
      ${starsHTML}
      <div style="margin-bottom:0.4rem"><span class="rank-badge" style="background:${rank.bg};color:${rank.color}">🏅 ${rank.name}</span></div>
      <div class="score-title">${msg}</div>
      <div class="score-sub">${pct}% верных · ${errors} ошибок · <b style="color:#ef4444">⭐ ${xp} XP</b></div>
      ${statsHTML}
      <div class="btn-row" style="justify-content:center;gap:10px;flex-wrap:wrap;">${backBtn}${replayBtn}${nextBtn}</div>
      ${retryBtn?`<div class="btn-row" style="justify-content:center;margin-top:8px;">${retryBtn}</div>`:''}
    </div>
    <div class="card">
      <div class="section-title">Грамматическая справка</div>
      ${activeGrammar||''}
    </div>
    <div class="card">
      <div class="section-title">Ошибки (${wrong.length})</div>
      ${wrongHTML}
    </div>`;
}

us: 10px;\n    padding: 9px 18px;\n    cursor: pointer;\n    transition: transform 0.1s, opacity 0.1s;\n    display: flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .btn:active { transform: scale(0.96); }\n  .btn:disabled { opacity: 0.35; cursor: default; }\n\n  .btn-play-all {\n    background: var(--accent);\n    color: #fff;\n    font-weight: 600;\n  }\n  .btn-stop {\n    background: var(--card2);\n    color: var(--text);\n    border: 1px solid var(--border);\n  }\n  .btn-reveal {\n    background: var(--card2);\n    color: var(--yellow);\n    border: 1px solid #3a3018;\n    margin-left: auto;\n  }\n\n  .speed-wrap {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 0.78rem;\n    color: var(--muted);\n  }\n  .speed-wrap input[type=range] {\n    width: 80px;\n    accent-color: var(--accent);\n  }\n\n  \u002f* ── PROGRESS BAR ── *\u002f\n  .progress-wrap {\n    max-width: 700px;\n    margin: 0 auto 1rem;\n    padding: 0 1.5rem;\n  }\n  .progress-track {\n    height: 3px;\n    background: var(--border);\n    border-radius: 2px;\n    overflow: hidden;\n  }\n  .progress-fill {\n    height: 100%;\n    background: var(--accent);\n    border-radius: 2px;\n    width: 0%;\n    transition: width 0.4s ease;\n  }\n\n  \u002f* ── DIALOGUE ── *\u002f\n  .dialogue {\n    max-width: 700px;\n    margin: 0 auto;\n    padding: 0 1.5rem;\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n  }\n\n  .line {\n    display: flex;\n    gap: 12px;\n    align-items: flex-start;\n    border-radius: 14px;\n    padding: 12px 14px;\n    border: 1px solid var(--border);\n    background: var(--card);\n    transition: background 0.2s, border-color 0.2s, transform 0.15s;\n    cursor: pointer;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .line:hover { background: var(--card2); }\n\n  .line.playing {\n    border-color: var(--accent);\n    background: #1a1530;\n    transform: translateX(4px);\n  }\n  .line.alex.playing { border-color: var(--alex); background: #0b1628; }\n  .line.mary.playing { border-color: var(--mary); background: #200b18; }\n\n  \u002f* speaker glow line on left *\u002f\n  .line::before {\n    content: '';\n    position: absolute;\n    left: 0; top: 0; bottom: 0;\n    width: 3px;\n    border-radius: 3px 0 0 3px;\n    background: transparent;\n    transition: background 0.2s;\n  }\n  .line.alex::before { background: var(--alex); opacity: 0.5; }\n  .line.mary::before { background: var(--mary); opacity: 0.5; }\n  .line.playing.alex::before { opacity: 1; }\n  .line.playing.mary::before { opacity: 1; }\n\n  .line-num {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 0.6rem;\n    color: var(--muted);\n    min-width: 18px;\n    padding-top: 3px;\n    text-align: right;\n  }\n\n  .speaker-icon {\n    width: 32px;\n    height: 32px;\n    border-radius: 50%;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 0.7rem;\n    font-weight: 700;\n    font-family: 'Unbounded', sans-serif;\n    flex-shrink: 0;\n    letter-spacing: 0;\n  }\n  .alex .speaker-icon { background: var(--alex-bg); color: var(--alex); }\n  .mary .speaker-icon { background: var(--mary-bg); color: var(--mary); }\n\n  .line-body { flex: 1; min-width: 0; }\n\n  .line-ru {\n    font-size: 0.8rem;\n    color: var(--muted);\n    margin-bottom: 4px;\n    line-height: 1.4;\n  }\n\n  .line-en {\n    font-size: 0.92rem;\n    font-weight: 500;\n    color: var(--text);\n    line-height: 1.4;\n    transition: filter 0.3s;\n  }\n  .line-en.hidden {\n    filter: blur(6px);\n    user-select: none;\n    color: var(--muted);\n  }\n\n  .play-btn {\n    width: 32px;\n    height: 32px;\n    border-radius: 50%;\n    border: 1px solid var(--border);\n    background: var(--card2);\n    color: var(--muted);\n    cursor: pointer;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 0.85rem;\n    flex-shrink: 0;\n    transition: background 0.12s, color 0.12s, border-color 0.12s;\n  }\n  .play-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }\n  .line.playing .play-btn { background: var(--accent); color: #fff; border-color: var(--accent); animation: pulse 1s ease infinite; }\n  @keyframes pulse {\n    0%, 100% { box-shadow: 0 0 0 0 rgba(124,92,252,0.5); }\n    50%       { box-shadow: 0 0 0 6px rgba(124,92,252,0); }\n  }\n\n  \u002f* ── PAGE TABS ── *\u002f\n  .page-tabs {\n    max-width: 700px;\n    margin: 0 auto 0;\n    padding: 0 1.5rem;\n    display: flex;\n    gap: 0;\n    border-bottom: 2px solid var(--border);\n  }\n  .page-tab {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 500;\n    background: none;\n    border: none;\n    color: var(--muted);\n    padding: 10px 20px;\n    cursor: pointer;\n    border-bottom: 2px solid transparent;\n    margin-bottom: -2px;\n    transition: color 0.15s, border-color 0.15s;\n  }\n  .page-tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }\n  .page-tab:hover:not(.active) { color: var(--text); }\n  .tab-panel { display: none; }\n  .tab-panel.active { display: block; }\n\n  \u002f* ── GRAMMAR EXERCISE ── *\u002f\n  .ex-wrap {\n    max-width: 700px;\n    margin: 0 auto;\n    padding: 1.5rem 1.5rem 0;\n  }\n  .ex-header {\n    margin-bottom: 1.2rem;\n  }\n  .ex-header h2 {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 1rem;\n    font-weight: 700;\n    margin-bottom: 0.3rem;\n  }\n  .ex-header p { font-size: 0.82rem; color: var(--muted); }\n\n  .ex-tabs {\n    display: flex;\n    gap: 8px;\n    flex-wrap: wrap;\n    margin-bottom: 1.2rem;\n  }\n  .ex-tab {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.78rem;\n    font-weight: 500;\n    padding: 6px 14px;\n    border-radius: 100px;\n    border: 1px solid var(--border);\n    background: var(--card);\n    color: var(--muted);\n    cursor: pointer;\n    transition: all 0.15s;\n  }\n  .ex-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }\n  .ex-tab:hover:not(.active) { color: var(--text); border-color: var(--muted); }\n\n  .ex-panel { display: none; }\n  .ex-panel.active { display: block; }\n\n  \u002f* Fill in the blank *\u002f\n  .fill-list { display: flex; flex-direction: column; gap: 10px; }\n  .fill-item {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 14px 16px;\n    transition: border-color 0.2s;\n  }\n  .fill-item.correct { border-color: var(--green); background: #0d1f16; }\n  .fill-item.wrong   { border-color: #f87171; background: #1f0d0d; }\n  .fill-context {\n    font-size: 0.78rem;\n    color: var(--muted);\n    margin-bottom: 6px;\n  }\n  .fill-sentence {\n    font-size: 0.92rem;\n    font-weight: 500;\n    line-height: 1.6;\n    display: flex;\n    align-items: center;\n    flex-wrap: wrap;\n    gap: 4px;\n  }\n  .fill-input {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.9rem;\n    font-weight: 600;\n    background: var(--card2);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    color: var(--text);\n    padding: 3px 10px;\n    min-width: 100px;\n    outline: none;\n    transition: border-color 0.15s;\n    text-align: center;\n  }\n  .fill-input:focus { border-color: var(--accent); }\n  .fill-input.correct { border-color: var(--green); color: var(--green); background: #0d1f16; }\n  .fill-input.wrong   { border-color: #f87171; color: #f87171; background: #1f0d0d; }\n  .fill-feedback {\n    font-size: 0.78rem;\n    margin-top: 6px;\n    min-height: 1.2em;\n    display: none;\n  }\n  .fill-feedback.show { display: block; }\n  .fill-feedback.ok { color: var(--green); }\n  .fill-feedback.no { color: #f87171; }\n\n  \u002f* MCQ *\u002f\n  .mcq-list { display: flex; flex-direction: column; gap: 12px; }\n  .mcq-item {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 14px 16px;\n  }\n  .mcq-item.correct { border-color: var(--green); background: #0d1f16; }\n  .mcq-item.wrong   { border-color: #f87171; background: #1f0d0d; }\n  .mcq-q {\n    font-size: 0.92rem;\n    font-weight: 500;\n    margin-bottom: 10px;\n    line-height: 1.5;\n  }\n  .mcq-context { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }\n  .mcq-opts { display: flex; gap: 8px; flex-wrap: wrap; }\n  .mcq-opt {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 500;\n    padding: 7px 16px;\n    border-radius: 10px;\n    border: 1px solid var(--border);\n    background: var(--card2);\n    color: var(--text);\n    cursor: pointer;\n    transition: all 0.12s;\n  }\n  .mcq-opt:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }\n  .mcq-opt:disabled { cursor: default; }\n  .mcq-opt.correct { background: #0d1f16; border-color: var(--green); color: var(--green); }\n  .mcq-opt.wrong   { background: #1f0d0d; border-color: #f87171; color: #f87171; }\n  .mcq-feedback { font-size: 0.78rem; margin-top: 8px; min-height: 1.1em; }\n  .mcq-feedback.ok { color: var(--green); }\n  .mcq-feedback.no { color: #f87171; }\n\n  \u002f* Verb finder *\u002f\n  .vf-instruction { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; line-height: 1.5; }\n  .vf-lines { display: flex; flex-direction: column; gap: 8px; }\n  .vf-line {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 12px 16px;\n  }\n  .vf-speaker { font-size: 0.7rem; font-family: 'Unbounded', sans-serif; color: var(--muted); margin-bottom: 4px; }\n  .vf-text { font-size: 0.92rem; font-weight: 500; line-height: 1.6; }\n  .vf-word {\n    cursor: pointer;\n    border-radius: 4px;\n    padding: 1px 3px;\n    transition: background 0.12s;\n    display: inline-block;\n  }\n  .vf-word:hover { background: var(--card2); }\n  .vf-word.selected-ok { background: #0d1f16; color: var(--green); border-radius: 6px; }\n  .vf-word.selected-no { background: #1f0d0d; color: #f87171; border-radius: 6px; }\n  .vf-result { font-size: 0.78rem; margin-top: 8px; color: var(--muted); }\n\n  \u002f* Score bar *\u002f\n  .score-bar {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 14px;\n    padding: 14px 18px;\n    margin-bottom: 1.2rem;\n    display: flex;\n    align-items: center;\n    gap: 14px;\n  }\n  .score-num { font-family: 'Unbounded', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--accent); }\n  .score-label { font-size: 0.8rem; color: var(--muted); }\n  .score-stars { font-size: 1.1rem; margin-left: auto; }\n\n  .ex-check-btn {\n    margin-top: 1rem;\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 600;\n    padding: 10px 22px;\n    border-radius: 10px;\n    border: none;\n    background: var(--accent);\n    color: #fff;\n    cursor: pointer;\n    transition: opacity 0.1s, transform 0.1s;\n  }\n  .ex-check-btn:active { transform: scale(0.96); }\n  .ex-reset-btn {\n    margin-top: 0.5rem;\n    margin-left: 8px;\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 500;\n    padding: 10px 18px;\n    border-radius: 10px;\n    border: 1px solid var(--border);\n    background: var(--card2);\n    color: var(--muted);\n    cursor: pointer;\n  }\n\n  \u002f* ── NOTICE ── *\u002f\n  .notice {\n    max-width: 700px;\n    margin: 1.5rem auto 0;\n    padding: 0 1.5rem;\n  }\n  .notice-inner {\n    background: #1a1520;\n    border: 1px solid #2a2040;\n    border-radius: 12px;\n    padding: 12px 16px;\n    font-size: 0.78rem;\n    color: var(--muted);\n    display: flex;\n    gap: 10px;\n    align-items: flex-start;\n  }\n  .notice-inner .ico { font-size: 1rem; flex-shrink: 0; }\n\n  \u002f* ── STATUS ── *\u002f\n  .status {\n    max-width: 700px;\n    margin: 0.75rem auto 0;\n    padding: 0 1.5rem;\n    font-size: 0.75rem;\n    color: var(--muted);\n    min-height: 1.2em;\n  }\n\u003c\u002fstyle\u003e\n\u003c\u002fhead\u003e\n\u003cbody\u003e\n\n\u003cheader\u003e\n  \u003cdiv class=\"header-tag\"\u003ePast Simple Tense · Диалог Alex & Mary\u003c\u002fdiv\u003e\n  \u003ch1\u003eАудио + Грамматика\u003c\u002fh1\u003e\n  \u003cp\u003eДва режима: слушайте диалог или выполните грамматическое упражнение.\u003c\u002fp\u003e\n\u003c\u002fheader\u003e\n\n\u003c!-- Page Tabs --\u003e\n\u003cdiv class=\"page-tabs\"\u003e\n  \u003cbutton class=\"page-tab active\" onclick=\"switchPageTab('audio')\"\u003e🔊 Диалог\u003c\u002fbutton\u003e\n  \u003cbutton class=\"page-tab\" onclick=\"switchPageTab('grammar')\"\u003e✏️ Грамматика\u003c\u002fbutton\u003e\n\u003c\u002fdiv\u003e\n\n\u003c!-- ═══ TAB: AUDIO ═══ --\u003e\n\u003cdiv class=\"tab-panel active\" id=\"ptab-audio\"\u003e\n\n\u003cdiv class=\"controls\"\u003e\n  \u003cbutton class=\"btn btn-play-all\" id=\"btn-play-all\" onclick=\"playAll()\"\u003e▶ Слушать весь диалог\u003c\u002fbutton\u003e\n  \u003cbutton class=\"btn btn-stop\" id=\"btn-stop\" onclick=\"stopAll()\" disabled\u003e■ Стоп\u003c\u002fbutton\u003e\n  \u003cdiv class=\"speed-wrap\"\u003e\n    🐢\n    \u003cinput type=\"range\" id=\"speed\" min=\"0.6\" max=\"1.3\" step=\"0.1\" value=\"0.9\" oninput=\"updateSpeed(this.value)\"\u003e\n    🐇\n    \u003cspan id=\"speed-val\"\u003e0.9×\u003c\u002fspan\u003e\n  \u003c\u002fdiv\u003e\n  \u003cbutton class=\"btn btn-reveal\" id=\"btn-reveal\" onclick=\"toggleReveal()\"\u003e👁 Скрыть перевод\u003c\u002fbutton\u003e\n\u003c\u002fdiv\u003e\n\n\u003cdiv class=\"progress-wrap\"\u003e\n  \u003cdiv class=\"progress-track\"\u003e\u003cdiv class=\"progress-fill\" id=\"progress-fill\"\u003e\u003c\u002fdiv\u003e\u003c\u002fdiv\u003e\n\u003c\u002fdiv\u003e\n\u003cdiv class=\"status\" id=\"status\"\u003e\u003c\u002fdiv\u003e\n\n\u003cdiv class=\"dialogue\" id=\"dialogue\"\u003e\u003c\u002fdiv\u003e\n\n\u003cdiv class=\"notice\"\u003e\n  \u003cdiv class=\"notice-inner\"\u003e\n    \u003cspan class=\"ico\"\u003e💬\u003c\u002fspan\u003e\n    \u003cspan\u003eОзвучивание работает через Web Speech API — встроенный синтез речи браузера. Лучшее качество в \u003cb\u003eGoogle Chrome\u003c\u002fb\u003e. Если звука нет — проверьте, что браузер не заглушён.\u003c\u002fspan\u003e\n  \u003c\u002fdiv\u003e\n\u003c\u002fdiv\u003e\n\n\u003c\u002fdiv\u003e\u003c!-- \u002fptab-audio --\u003e\n\n\u003c!-- ═══ TAB: GRAMMAR ═══ --\u003e\n\u003cdiv class=\"tab-panel\" id=\"ptab-grammar\"\u003e\n\u003cdiv class=\"ex-wrap\"\u003e\n\n  \u003cdiv class=\"ex-header\"\u003e\n    \u003ch2\u003eГрамматические упражнения\u003c\u002fh2\u003e\n    \u003cp\u003eТри типа заданий на основе диалога. Выберите упражнение:\u003c\u002fp\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003cdiv class=\"ex-tabs\"\u003e\n    \u003cbutton class=\"ex-tab active\" onclick=\"switchExTab('fill')\"\u003e1 · Вставьте слово\u003c\u002fbutton\u003e\n    \u003cbutton class=\"ex-tab\" onclick=\"switchExTab('mcq')\"\u003e2 · Выберите форму\u003c\u002fbutton\u003e\n    \u003cbutton class=\"ex-tab\" onclick=\"switchExTab('vf')\"\u003e3 · Найдите глаголы\u003c\u002fbutton\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003c!-- ── EX 1: Fill in the blank ── --\u003e\n  \u003cdiv class=\"ex-panel active\" id=\"ex-fill\"\u003e\n    \u003cdiv class=\"score-bar\" id=\"fill-score-bar\" style=\"display:none\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv class=\"score-num\" id=\"fill-score-num\"\u003e0\u002f8\u003c\u002fdiv\u003e\n        \u003cdiv class=\"score-label\"\u003eправильных ответов\u003c\u002fdiv\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"score-stars\" id=\"fill-score-stars\"\u003e\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"fill-list\" id=\"fill-list\"\u003e\u003c\u002fdiv\u003e\n    \u003cdiv\u003e\n      \u003cbutton class=\"ex-check-btn\" onclick=\"checkFill()\"\u003eПроверить\u003c\u002fbutton\u003e\n      \u003cbutton class=\"ex-reset-btn\" onclick=\"resetFill()\"\u003eСбросить\u003c\u002fbutton\u003e\n    \u003c\u002fdiv\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003c!-- ── EX 2: MCQ ── --\u003e\n  \u003cdiv class=\"ex-panel\" id=\"ex-mcq\"\u003e\n    \u003cdiv class=\"score-bar\" id=\"mcq-score-bar\" style=\"display:none\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv class=\"score-num\" id=\"mcq-score-num\"\u003e0\u002f7\u003c\u002fdiv\u003e\n        \u003cdiv class=\"score-label\"\u003eправильных ответов\u003c\u002fdiv\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"score-stars\" id=\"mcq-score-stars\"\u003e\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"mcq-list\" id=\"mcq-list\"\u003e\u003c\u002fdiv\u003e\n    \u003cdiv style=\"margin-top:1rem;\"\u003e\n      \u003cbutton class=\"ex-reset-btn\" onclick=\"resetMcq()\"\u003eСбросить\u003c\u002fbutton\u003e\n    \u003c\u002fdiv\u003e\n  \u003c\u002fdiv\u003e\n\n  \u003c!-- ── EX 3: Verb finder ── --\u003e\n  \u003cdiv class=\"ex-panel\" id=\"ex-vf\"\u003e\n    \u003cdiv class=\"vf-instruction\"\u003e\n      Нажимайте на слова, которые стоят в \u003cb\u003ePast Simple\u003c\u002fb\u003e (прошедшее простое время). Нажмите ещё раз — снять выбор.\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"score-bar\" id=\"vf-score-bar\" style=\"display:none\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv class=\"score-num\" id=\"vf-score-num\"\u003e0\u002f8\u003c\u002fdiv\u003e\n        \u003cdiv class=\"score-label\"\u003eглаголов найдено\u003c\u002fdiv\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"score-stars\" id=\"vf-score-stars\"\u003e\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cdiv class=\"vf-lines\" id=\"vf-lines\"\u003e\u003c\u002fdiv\u003e\n    \u003cdiv style=\"margin-top:1rem;\"\u003e\n      \u003cbutton class=\"ex-check-btn\" onclick=\"checkVF()\"\u003eПроверить\u003c\u002fbutton\u003e\n      \u003cbutton class=\"ex-reset-btn\" onclick=\"resetVF()\"\u003eСбросить\u003c\u002fbutton\u003e\n    \u003c\u002fdiv\u003e\n  \u003c\u002fdiv\u003e\n\n\u003c\u002fdiv\u003e\n\u003c\u002fdiv\u003e\u003c!-- \u002fptab-grammar --\u003e\n\n\u003cscript\u003e\nconst LINES = [\n  { speaker:'Alex', ru:'Привет! Ты работал в понедельник?',                          en:'Hi! Did you work on Monday?' },\n  { speaker:'Mary', ru:'Да. Я работал после обеда.',                                  en:'Yes, I did. I worked after lunch.' },\n  { speaker:'Alex', ru:'Что ты делал после работы?',                                  en:'What did you do after work?' },\n  { speaker:'Mary', ru:'Я тренировался. Ты любишь спорт?',                            en:'I trained. Do you like sport?' },\n  { speaker:'Alex', ru:'Да. Я тренировалась на прошлой неделе каждый день. Где ты тренировалась?', en:'Yes, I do. I trained last week every day. Where did you train?' },\n  { speaker:'Mary', ru:'Я тренировалась в фитнес клубе.',                              en:'I trained in the fitness club.' },\n  { speaker:'Alex', ru:'У тебя много друзей?',                                         en:'Do you have many friends?' },\n  { speaker:'Mary', ru:'Да. Мы встречались в воскресенье. Ты любишь читать?',          en:'Yes, I do. We met on Sunday. Do you like to read?' },\n  { speaker:'Alex', ru:'Да. Два дня назад я прочитал интересную книгу.',               en:'Yes, I do. I read an interesting book two days ago.' },\n  { speaker:'Mary', ru:'Спасибо за звонок.',                                            en:'Thank you for calling.' },\n  { speaker:'Alex', ru:'Хорошего дня.',                                                 en:'Have a nice day.' },\n];\n\nlet currentIdx = -1;\nlet isPlayingAll = false;\nlet speechRate = 0.9;\nlet revealed = true;\n\n\u002f\u002f Build UI\nconst dlg = document.getElementById('dialogue');\nLINES.forEach((l, i) =\u003e {\n  const sp = l.speaker.toLowerCase();\n  const div = document.createElement('div');\n  div.className = `line ${sp}`;\n  div.id = `line-${i}`;\n  div.onclick = () =\u003e playSingle(i);\n  div.innerHTML = `\n    \u003cspan class=\"line-num\"\u003e${i+1}\u003c\u002fspan\u003e\n    \u003cdiv class=\"speaker-icon\"\u003e${l.speaker.substring(0,2).toUpperCase()}\u003c\u002fdiv\u003e\n    \u003cdiv class=\"line-body\"\u003e\n      \u003cdiv class=\"line-ru\"\u003e${l.ru}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"line-en\" id=\"en-${i}\"\u003e${l.en}\u003c\u002fdiv\u003e\n    \u003c\u002fdiv\u003e\n    \u003cbutton class=\"play-btn\" onclick=\"event.stopPropagation();playSingle(${i})\"\u003e▶\u003c\u002fbutton\u003e\n  `;\n  dlg.appendChild(div);\n});\n\nfunction updateSpeed(v){\n  speechRate = parseFloat(v);\n  document.getElementById('speed-val').textContent = v + '×';\n}\n\nfunction setStatus(txt){ document.getElementById('status').textContent = txt; }\n\nfunction setProgress(i){\n  const pct = LINES.length ? ((i+1)\u002fLINES.length*100) : 0;\n  document.getElementById('progress-fill').style.width = pct + '%';\n}\n\nfunction clearHighlight(){\n  document.querySelectorAll('.line').forEach(l=\u003el.classList.remove('playing'));\n}\n\nfunction highlight(i){\n  clearHighlight();\n  const el = document.getElementById(`line-${i}`);\n  if(el){\n    el.classList.add('playing');\n    el.scrollIntoView({behavior:'smooth', block:'nearest'});\n  }\n  setProgress(i);\n}\n\nfunction speak(text, rate){\n  return new Promise((resolve) =\u003e {\n    window.speechSynthesis.cancel();\n    const u = new SpeechSynthesisUtterance(text);\n    u.lang = 'en-GB';\n    u.rate = rate || speechRate;\n    \u002f\u002f Try to pick an English voice\n    const voices = window.speechSynthesis.getVoices();\n    const en = voices.find(v=\u003ev.lang.startsWith('en-') && v.name.toLowerCase().includes('female'))\n            || voices.find(v=\u003ev.lang.startsWith('en-'))\n            || null;\n    if(en) u.voice = en;\n    u.onend = resolve;\n    u.onerror = resolve;\n    window.speechSynthesis.speak(u);\n  });\n}\n\nasync function playSingle(i){\n  stopAll();\n  currentIdx = i;\n  highlight(i);\n  setStatus(`Воспроизведение: строка ${i+1} — ${LINES[i].speaker}`);\n  await speak(LINES[i].en);\n  clearHighlight();\n  setStatus('');\n  currentIdx = -1;\n}\n\nasync function playAll(){\n  stopAll();\n  isPlayingAll = true;\n  document.getElementById('btn-play-all').disabled = true;\n  document.getElementById('btn-stop').disabled = false;\n  document.getElementById('progress-fill').style.width = '0%';\n\n  for(let i = 0; i \u003c LINES.length; i++){\n    if(!isPlayingAll) break;\n    currentIdx = i;\n    highlight(i);\n    setStatus(`▶ ${i+1} \u002f ${LINES.length} — ${LINES[i].speaker}: «${LINES[i].en}»`);\n    await speak(LINES[i].en);\n    \u002f\u002f small pause between lines\n    if(isPlayingAll) await new Promise(r=\u003esetTimeout(r, 600));\n  }\n\n  clearHighlight();\n  setStatus(isPlayingAll ? '✅ Диалог завершён' : '');\n  document.getElementById('progress-fill').style.width = isPlayingAll ? '100%' : '0%';\n  document.getElementById('btn-play-all').disabled = false;\n  document.getElementById('btn-stop').disabled = true;\n  isPlayingAll = false;\n  currentIdx = -1;\n}\n\nfunction stopAll(){\n  isPlayingAll = false;\n  window.speechSynthesis.cancel();\n  clearHighlight();\n  setStatus('');\n  document.getElementById('btn-play-all').disabled = false;\n  document.getElementById('btn-stop').disabled = true;\n  currentIdx = -1;\n}\n\nfunction toggleReveal(){\n  revealed = !revealed;\n  const btn = document.getElementById('btn-reveal');\n  document.querySelectorAll('.line-en').forEach(el=\u003e{\n    el.classList.toggle('hidden', !revealed);\n  });\n  btn.textContent = revealed ? '👁 Скрыть перевод' : '👁 Показать перевод';\n}\n\n\u002f\u002f Load voices (Chrome needs this trigger)\nwindow.speechSynthesis.onvoiceschanged = () =\u003e { window.speechSynthesis.getVoices(); };\nwindow.speechSynthesis.getVoices();\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f PAGE TABS\n\u002f\u002f ══════════════════════════════════════════\nfunction switchPageTab(name){\n  document.querySelectorAll('.page-tab').forEach(t=\u003et.classList.remove('active'));\n  document.querySelectorAll('.tab-panel').forEach(p=\u003ep.classList.remove('active'));\n  document.getElementById('ptab-'+name).classList.add('active');\n  document.querySelectorAll('.page-tab').forEach(t=\u003e{\n    if(t.getAttribute('onclick')===`switchPageTab('${name}')`) t.classList.add('active');\n  });\n}\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EXERCISE TABS\n\u002f\u002f ══════════════════════════════════════════\nfunction switchExTab(name){\n  document.querySelectorAll('.ex-tab').forEach(t=\u003et.classList.remove('active'));\n  document.querySelectorAll('.ex-panel').forEach(p=\u003ep.classList.remove('active'));\n  document.getElementById('ex-'+name).classList.add('active');\n  document.querySelectorAll('.ex-tab').forEach(t=\u003e{\n    if(t.getAttribute('onclick')===`switchExTab('${name}')`) t.classList.add('active');\n  });\n}\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EX 1 — FILL IN THE BLANK\n\u002f\u002f ══════════════════════════════════════════\nconst FILL_DATA = [\n  { before:'Hi! ', blank:'Did', after:' you work on Monday?', hint:'Вспомогательный глагол для вопроса в Past Simple', context:'Alex, строка 1' },\n  { before:'Yes, I did. I ', blank:'worked', after:' after lunch.', hint:'Правильный глагол: work → Past Simple', context:'Mary, строка 2' },\n  { before:'What ', blank:'did', after:' you do after work?', hint:'Вспомогательный глагол для спец. вопроса', context:'Alex, строка 3' },\n  { before:'I ', blank:'trained', after:'. Do you like sport?', hint:'Правильный глагол: train → Past Simple', context:'Mary, строка 4' },\n  { before:'Yes, I do. I trained last week every day. Where ', blank:'did', after:' you train?', hint:'Вспомогательный глагол для вопроса Where...?', context:'Alex, строка 5' },\n  { before:'I ', blank:'trained', after:' in the fitness club.', hint:'Правильный глагол: train → Past Simple', context:'Mary, строка 6' },\n  { before:'Yes, I do. We ', blank:'met', after:' on Sunday.', hint:'Неправильный глагол: meet → Past Simple', context:'Mary, строка 8' },\n  { before:'I ', blank:'read', after:' an interesting book two days ago.', hint:'Неправильный глагол: read → Past Simple (произносится [rɛd])', context:'Alex, строка 9' },\n];\n\nfunction buildFill(){\n  const list = document.getElementById('fill-list');\n  list.innerHTML = '';\n  FILL_DATA.forEach((d, i) =\u003e {\n    const div = document.createElement('div');\n    div.className = 'fill-item';\n    div.id = `fi-${i}`;\n    div.innerHTML = `\n      \u003cdiv class=\"fill-context\"\u003e${d.context}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"fill-sentence\"\u003e\n        \u003cspan\u003e${d.before}\u003c\u002fspan\u003e\n        \u003cinput class=\"fill-input\" id=\"fi-inp-${i}\" type=\"text\" placeholder=\"?\" autocomplete=\"off\" spellcheck=\"false\" oninput=\"onFillInput(${i})\"\u003e\n        \u003cspan\u003e${d.after}\u003c\u002fspan\u003e\n      \u003c\u002fdiv\u003e\n      \u003cdiv class=\"fill-feedback\" id=\"fi-fb-${i}\"\u003e\u003c\u002fdiv\u003e\n    `;\n    list.appendChild(div);\n  });\n}\n\nfunction onFillInput(i){\n  \u002f\u002f clear previous state on edit\n  const inp = document.getElementById(`fi-inp-${i}`);\n  inp.classList.remove('correct','wrong');\n  const fb = document.getElementById(`fi-fb-${i}`);\n  fb.className = 'fill-feedback';\n  document.getElementById(`fi-${i}`).classList.remove('correct','wrong');\n}\n\nfunction checkFill(){\n  let ok = 0;\n  FILL_DATA.forEach((d, i) =\u003e {\n    const inp = document.getElementById(`fi-inp-${i}`);\n    const val = inp.value.trim().toLowerCase();\n    const correct = d.blank.toLowerCase();\n    const fb = document.getElementById(`fi-fb-${i}`);\n    const item = document.getElementById(`fi-${i}`);\n    fb.className = 'fill-feedback show';\n    if(val === correct){\n      ok++;\n      inp.classList.add('correct');\n      item.classList.add('correct'); item.classList.remove('wrong');\n      fb.className = 'fill-feedback show ok';\n      fb.textContent = '✓ Верно!';\n    } else {\n      inp.classList.add('wrong');\n      item.classList.add('wrong'); item.classList.remove('correct');\n      fb.className = 'fill-feedback show no';\n      fb.textContent = `✗ Правильно: ${d.blank} — Подсказка: ${d.hint}`;\n    }\n  });\n  const bar = document.getElementById('fill-score-bar');\n  bar.style.display = 'flex';\n  document.getElementById('fill-score-num').textContent = `${ok}\u002f${FILL_DATA.length}`;\n  const pct = ok\u002fFILL_DATA.length;\n  document.getElementById('fill-score-stars').textContent = pct\u003e=0.9?'⭐⭐⭐':pct\u003e=0.7?'⭐⭐':pct\u003e=0.5?'⭐':'☆';\n}\n\nfunction resetFill(){\n  document.querySelectorAll('.fill-input').forEach(inp=\u003e{ inp.value=''; inp.classList.remove('correct','wrong'); });\n  document.querySelectorAll('.fill-item').forEach(it=\u003eit.classList.remove('correct','wrong'));\n  document.querySelectorAll('.fill-feedback').forEach(fb=\u003e{ fb.className='fill-feedback'; fb.textContent=''; });\n  document.getElementById('fill-score-bar').style.display='none';\n}\n\nbuildFill();\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EX 2 — MCQ: choose verb form\n\u002f\u002f ══════════════════════════════════════════\nconst MCQ_DATA = [\n  {\n    context: 'Alex, строка 1',\n    q: 'Hi! ___ you work on Monday?',\n    opts: ['Did','Do','Does','Will'],\n    correct: 'Did',\n    explain: 'Past Simple вопрос → Did + подлежащее + base form'\n  },\n  {\n    context: 'Mary, строка 2',\n    q: 'Yes, I did. I ___ after lunch.',\n    opts: ['worked','work','works','working'],\n    correct: 'worked',\n    explain: 'Утвердительное прошедшее: work → worked'\n  },\n  {\n    context: 'Alex, строка 3',\n    q: 'What did you ___ after work?',\n    opts: ['do','did','done','does'],\n    correct: 'do',\n    explain: 'После did глагол всегда в base form (инфинитив без to)'\n  },\n  {\n    context: 'Mary, строка 4',\n    q: 'I ___. Do you like sport?',\n    opts: ['trained','train','trains','training'],\n    correct: 'trained',\n    explain: 'Утвердительное прошедшее: train → trained'\n  },\n  {\n    context: 'Alex, строка 5',\n    q: 'Where did you ___?',\n    opts: ['train','trained','trains','training'],\n    correct: 'train',\n    explain: 'После did глагол всегда в base form'\n  },\n  {\n    context: 'Mary, строка 8',\n    q: 'We ___ on Sunday.',\n    opts: ['met','meet','meets','meeting'],\n    correct: 'met',\n    explain: 'Неправильный глагол: meet → met (Past Simple)'\n  },\n  {\n    context: 'Alex, строка 9',\n    q: 'I ___ an interesting book two days ago.',\n    opts: ['read','readed','reads','reading'],\n    correct: 'read',\n    explain: 'Неправильный глагол: read → read (Past Simple, произносится [rɛd])'\n  },\n];\n\nfunction buildMcq(){\n  const list = document.getElementById('mcq-list');\n  list.innerHTML = '';\n  MCQ_DATA.forEach((d,i)=\u003e{\n    const div = document.createElement('div');\n    div.className = 'mcq-item';\n    div.id = `mcq-${i}`;\n    const opts = d.opts.map(o=\u003e`\u003cbutton class=\"mcq-opt\" id=\"mcq-opt-${i}-${o.replace(\u002f\\s\u002fg,'_')}\" onclick=\"pickMcq(${i},'${o}')\"\u003e${o}\u003c\u002fbutton\u003e`).join('');\n    div.innerHTML = `\n      \u003cdiv class=\"mcq-context\"\u003e${d.context}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"mcq-q\"\u003e${d.q}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"mcq-opts\"\u003e${opts}\u003c\u002fdiv\u003e\n      \u003cdiv class=\"mcq-feedback\" id=\"mcq-fb-${i}\"\u003e\u003c\u002fdiv\u003e\n    `;\n    list.appendChild(div);\n  });\n}\n\nlet mcqAnswered = new Array(MCQ_DATA.length).fill(false);\nlet mcqScore = 0;\n\nfunction pickMcq(i, chosen){\n  if(mcqAnswered[i]) return;\n  mcqAnswered[i] = true;\n  const d = MCQ_DATA[i];\n  const item = document.getElementById(`mcq-${i}`);\n  const fb = document.getElementById(`mcq-fb-${i}`);\n  item.querySelectorAll('.mcq-opt').forEach(b=\u003eb.disabled=true);\n  if(chosen === d.correct){\n    mcqScore++;\n    item.classList.add('correct');\n    item.querySelector(`#mcq-opt-${i}-${chosen.replace(\u002f\\s\u002fg,'_')}`).classList.add('correct');\n    fb.className = 'mcq-feedback ok';\n    fb.textContent = '✓ Верно! ' + d.explain;\n  } else {\n    item.classList.add('wrong');\n    item.querySelector(`#mcq-opt-${i}-${chosen.replace(\u002f\\s\u002fg,'_')}`).classList.add('wrong');\n    const corrBtn = item.querySelector(`#mcq-opt-${i}-${d.correct.replace(\u002f\\s\u002fg,'_')}`);\n    if(corrBtn) corrBtn.classList.add('correct');\n    fb.className = 'mcq-feedback no';\n    fb.textContent = `✗ Правильно: ${d.correct} — ${d.explain}`;\n  }\n  \u002f\u002f show score after all answered\n  if(mcqAnswered.every(Boolean)){\n    const bar = document.getElementById('mcq-score-bar');\n    bar.style.display = 'flex';\n    document.getElementById('mcq-score-num').textContent = `${mcqScore}\u002f${MCQ_DATA.length}`;\n    const pct = mcqScore\u002fMCQ_DATA.length;\n    document.getElementById('mcq-score-stars').textContent = pct\u003e=0.9?'⭐⭐⭐':pct\u003e=0.7?'⭐⭐':pct\u003e=0.5?'⭐':'☆';\n    bar.scrollIntoView({behavior:'smooth',block:'nearest'});\n  }\n}\n\nfunction resetMcq(){\n  mcqAnswered = new Array(MCQ_DATA.length).fill(false);\n  mcqScore = 0;\n  document.getElementById('mcq-score-bar').style.display='none';\n  buildMcq();\n}\n\nbuildMcq();\n\n\u002f\u002f ══════════════════════════════════════════\n\u002f\u002f EX 3 — VERB FINDER\n\u002f\u002f ══════════════════════════════════════════\nconst VF_LINES = [\n  { speaker:'Alex', text:'Hi! Did you work on Monday?', pastVerbs:['Did','work'] },\n  { speaker:'Mary', text:'Yes, I did. I worked after lunch.', pastVerbs:['did','worked'] },\n  { speaker:'Alex', text:'What did you do after work?', pastVerbs:['did'] },\n  { speaker:'Mary', text:'I trained. Do you like sport?', pastVerbs:['trained'] },\n  { speaker:'Alex', text:\"Yes, I do. I trained last week every day. Where did you train?\", pastVerbs:['trained','did'] },\n  { speaker:'Mary', text:'I trained in the fitness club.', pastVerbs:['trained'] },\n  { speaker:'Mary', text:'Yes, I do. We met on Sunday. Do you like to read?', pastVerbs:['met'] },\n  { speaker:'Alex', text:'Yes, I do. I read an interesting book two days ago.', pastVerbs:['read'] },\n];\n\n\u002f\u002f All past simple verbs across lines (normalised)\nconst ALL_PAST = ['did','worked','trained','met','read'];\n\nfunction buildVF(){\n  const container = document.getElementById('vf-lines');\n  container.innerHTML = '';\n  VF_LINES.forEach((l,li)=\u003e{\n    const div = document.createElement('div');\n    div.className = 'vf-line';\n    const words = l.text.split(\u002f(\\s+|(?=[.,!?])|(?\u003c=[.,!?]))\u002f);\n    const spans = words.map((w,wi)=\u003e{\n      const clean = w.replace(\u002f[^a-zA-Z']\u002fg,'').toLowerCase();\n      const isPast = l.pastVerbs.map(v=\u003ev.toLowerCase()).includes(clean) && \u002f[a-zA-Z]\u002f.test(w);\n      if(!isPast || !\u002f[a-zA-Z]\u002f.test(w)) return `\u003cspan\u003e${w}\u003c\u002fspan\u003e`;\n      return `\u003cspan class=\"vf-word\" data-li=\"${li}\" data-wi=\"${wi}\" data-correct=\"1\" onclick=\"toggleVFWord(this)\"\u003e${w}\u003c\u002fspan\u003e`;\n    }).join('');\n    \u002f\u002f Also make non-past words clickable to catch wrong selections\n    const allSpans = l.text.split(' ').map((w,wi)=\u003e{\n      const clean = w.replace(\u002f[^a-zA-Z']\u002fg,'').toLowerCase();\n      const isPast = l.pastVerbs.map(v=\u003ev.toLowerCase()).includes(clean);\n      if(isPast){\n        return `\u003cspan class=\"vf-word\" data-li=\"${li}\" data-wi=\"${wi}\" data-correct=\"1\" onclick=\"toggleVFWord(this)\"\u003e${w}\u003c\u002fspan\u003e`;\n      }\n      return `\u003cspan class=\"vf-word\" data-li=\"${li}\" data-wi=\"${wi}\" data-correct=\"0\" onclick=\"toggleVFWord(this)\"\u003e${w}\u003c\u002fspan\u003e`;\n    }).join(' ');\n    div.innerHTML = `\u003cdiv class=\"vf-speaker\"\u003e${l.speaker}\u003c\u002fdiv\u003e\u003cdiv class=\"vf-text\"\u003e${allSpans}\u003c\u002fdiv\u003e`;\n    container.appendChild(div);\n  });\n}\n\nfunction toggleVFWord(el){\n  el.classList.toggle('selected');\n  if(!el.classList.contains('selected')){\n    el.classList.remove('selected-ok','selected-no');\n  }\n}\n\nfunction checkVF(){\n  let found = 0, wrong = 0, total = VF_LINES.reduce((s,l)=\u003es+l.pastVerbs.length,0);\n  document.querySelectorAll('.vf-word').forEach(el=\u003e{\n    const isCorrect = el.dataset.correct === '1';\n    const isSelected = el.classList.contains('selected');\n    el.classList.remove('selected','selected-ok','selected-no');\n    if(isSelected){\n      if(isCorrect){ el.classList.add('selected-ok'); found++; }\n      else { el.classList.add('selected-no'); wrong++; }\n    }\n  });\n  const bar = document.getElementById('vf-score-bar');\n  bar.style.display = 'flex';\n  document.getElementById('vf-score-num').textContent = `${found}\u002f${total} (лишних: ${wrong})`;\n  const pct = wrong===0 ? found\u002ftotal : Math.max(0,(found-wrong)\u002ftotal);\n  document.getElementById('vf-score-stars').textContent = pct\u003e=0.9?'⭐⭐⭐':pct\u003e=0.7?'⭐⭐':pct\u003e=0.5?'⭐':'☆';\n}\n\nfunction resetVF(){\n  document.getElementById('vf-score-bar').style.display='none';\n  buildVF();\n}\n\nbuildVF();\n\u003c\u002fscript\u003e\n\u003c\u002fbody\u003e\n\u003c\u002fhtml\u003e\n";
const DIALOGUE_FUTURE_HTML = "\u003c!DOCTYPE html\u003e\n\u003chtml lang=\"ru\"\u003e\n\u003chead\u003e\n\u003cmeta charset=\"UTF-8\"\u003e\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\u003e\n\u003ctitle\u003ePast Simple · Диалог\u003c\u002ftitle\u003e\n\u003clink href=\"https:\u002f\u002ffonts.googleapis.com\u002fcss2?family=Unbounded:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap\" rel=\"stylesheet\"\u003e\n\u003cstyle\u003e\n  :root {\n    --bg: #0f0f13;\n    --card: #18181f;\n    --card2: #1f1f2a;\n    --border: #2a2a38;\n    --text: #f0f0f5;\n    --muted: #7070a0;\n    --alex: #7c5cfc;\n    --alex-bg: #1a0d3c;\n    --mary: #e85d9a;\n    --mary-bg: #2d0d1f;\n    --accent: #7c5cfc;\n    --green: #34d399;\n    --yellow: #fbbf24;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    font-family: 'DM Sans', sans-serif;\n    background: var(--bg);\n    color: var(--text);\n    min-height: 100vh;\n    padding-bottom: 3rem;\n  }\n\n  \u002f* ── HEADER ── *\u002f\n  header {\n    padding: 2rem 1.5rem 1.5rem;\n    max-width: 700px;\n    margin: 0 auto;\n    position: relative;\n  }\n\n  .header-tag {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 0.6rem;\n    letter-spacing: 0.15em;\n    color: var(--accent);\n    text-transform: uppercase;\n    margin-bottom: 0.5rem;\n  }\n\n  header h1 {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 1.35rem;\n    font-weight: 700;\n    line-height: 1.25;\n    color: var(--text);\n    margin-bottom: 0.4rem;\n  }\n\n  header p {\n    font-size: 0.82rem;\n    color: var(--muted);\n  }\n\n  \u002f* ── CONTROLS ── *\u002f\n  .controls {\n    max-width: 700px;\n    margin: 0 auto 1.5rem;\n    padding: 0 1.5rem;\n    display: flex;\n    gap: 10px;\n    flex-wrap: wrap;\n    align-items: center;\n  }\n\n  .btn {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.82rem;\n    font-weight: 500;\n    border: none;\n    border-radius: 10px;\n    padding: 9px 18px;\n    cursor: pointer;\n    transition: transform 0.1s, opacity 0.1s;\n    display: flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .btn:active { transform: scale(0.96); }\n  .btn:disabled { opacity: 0.35; cursor: default; }\n\n  .btn-play-all {\n    background: var(--accent);\n    color: #fff;\n    font-weight: 600;\n  }\n  .btn-stop {\n    background: var(--card2);\n    color: var(--text);\n    border: 1px solid var(--border);\n  }\n  .btn-reveal {\n    background: var(--card2);\n    color: var(--yellow);\n    border: 1px solid #3a3018;\n    margin-left: auto;\n  }\n\n  .speed-wrap {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 0.78rem;\n    color: var(--muted);\n  }\n  .speed-wrap input[type=range] {\n    width: 80px;\n    accent-color: var(--accent);\n  }\n\n  \u002f* ── PROGRESS BAR ── *\u002f\n  .progress-wrap {\n    max-width: 700px;\n    margin: 0 auto 1rem;\n    padding: 0 1.5rem;\n  }\n  .progress-track {\n    height: 3px;\n    background: var(--border);\n    border-radius: 2px;\n    overflow: hidden;\n  }\n  .progress-fill {\n    height: 100%;\n    background: var(--accent);\n    border-radius: 2px;\n    width: 0%;\n    transition: width 0.4s ease;\n  }\n\n  \u002f* ── DIALOGUE ── *\u002f\n  .dialogue {\n    max-width: 700px;\n    margin: 0 auto;\n    padding: 0 1.5rem;\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n  }\n\n  .line {\n    display: flex;\n    gap: 12px;\n    align-items: flex-start;\n    border-radius: 14px;\n    padding: 12px 14px;\n    border: 1px solid var(--border);\n    background: var(--card);\n    transition: background 0.2s, border-color 0.2s, transform 0.15s;\n    cursor: pointer;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .line:hover { background: var(--card2); }\n\n  .line.playing {\n    border-color: var(--accent);\n    background: #1a1530;\n    transform: translateX(4px);\n  }\n  .line.alex.playing { border-color: var(--alex); background: #0b1628; }\n  .line.mary.playing { border-color: var(--mary); background: #200b18; }\n\n  \u002f* speaker glow line on left *\u002f\n  .line::before {\n    content: '';\n    position: absolute;\n    left: 0; top: 0; bottom: 0;\n    width: 3px;\n    border-radius: 3px 0 0 3px;\n    background: transparent;\n    transition: background 0.2s;\n  }\n  .line.alex::before { background: var(--alex); opacity: 0.5; }\n  .line.mary::before { background: var(--mary); opacity: 0.5; }\n  .line.playing.alex::before { opacity: 1; }\n  .line.playing.mary::before { opacity: 1; }\n\n  .line-num {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 0.6rem;\n    color: var(--muted);\n    min-width: 18px;\n    padding-top: 3px;\n    text-align: right;\n  }\n\n  .speaker-icon {\n    width: 32px;\n    height: 32px;\n    border-radius: 50%;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 0.7rem;\n    font-weight: 700;\n    font-family: 'Unbounded', sans-serif;\n    flex-shrink: 0;\n    letter-spacing: 0;\n  }\n  .alex .speaker-icon { background: var(--alex-bg); color: var(--alex); }\n  .mary .speaker-icon { background: var(--mary-bg); color: var(--mary); }\n\n  .line-body { flex: 1; min-width: 0; }\n\n  .line-ru {\n    font-size: 0.8rem;\n    color: var(--muted);\n    margin-bottom: 4px;\n    line-height: 1.4;\n  }\n\n  .line-en {\n    font-size: 0.92rem;\n    font-weight: 500;\n    color: var(--text);\n    line-height: 1.4;\n    transition: filter 0.3s;\n  }\n  .line-en.hidden {\n    filter: blur(6px);\n    user-select: none;\n    color: var(--muted);\n  }\n\n  .play-btn {\n    width: 32px;\n    height: 32px;\n    border-radius: 50%;\n    border: 1px solid var(--border);\n    background: var(--card2);\n    color: var(--muted);\n    cursor: pointer;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 0.85rem;\n    flex-shrink: 0;\n    transition: background 0.12s, color 0.12s, bo
