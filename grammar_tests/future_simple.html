try { goRoot(); dbg('goRoot OK'); } catch(e) { dbg('goRoot FAIL: '+e); }

(function fixIOSButtons(){
  var btns = document.querySelectorAll('.tense-card, .quiz-btn');
  dbg('buttons found: '+btns.length);
  var map = {
    'openTense_past':  function(){ dbg('tap past'); openTense('past'); },
    'openTense_pres':  function(){ dbg('tap pres'); openTense('pres'); },
    'openTense_fut':   function(){ dbg('tap fut');  openTense('fut');  },
    'startMixed_sections': function(){ dbg('tap mix sections'); startMixed('sections'); },
    'startMixed_30':   function(){ dbg('tap mix 30'); startMixed('30'); },
  };
  btns.forEach(function(btn){
    var oc = btn.getAttribute('onclick') || '';
    var fn = null;
    if(oc.indexOf("openTense('past')")>-1) fn = map['openTense_past'];
    else if(oc.indexOf("openTense('pres')")>-1) fn = map['openTense_pres'];
    else if(oc.indexOf("openTense('fut')")>-1) fn = map['openTense_fut'];
    else if(oc.indexOf("startMixed('sections')")>-1) fn = map['startMixed_sections'];
    else if(oc.indexOf("startMixed('30')")>-1) fn = map['startMixed_30'];
    if(fn){
      btn.removeAttribute('onclick');
      btn.addEventListener('click', fn);
      btn.addEventListener('touchend', function(e){ e.preventDefault(); fn(); });
    }
  });
  dbg('listeners attached');
})();

function sendToGoogleForms(name, group, testName, result, xpEarned, timerOn) {
  var formUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSdfme_aKvoexXRSz7LTn5dxgY_7P2lBJsokU3puqehRxZVslw/formResponse';
  var body = new FormData();
  body.append('entry.1795360459', name);
  body.append('entry.1572037373', group);
  body.append('entry.1562414669', testName);
  var _pct = Math.round(result.split('/')[0] / (result.split('/')[1]||1) * 100);
  var _grade = getGrade(_pct);
  var _attempt = getAttemptNum('attempt_future_simple');
  var _hintsUsed = (3 - hints);
  var _resultFull = result + ' (' + _pct + '%) | Оценка: ' + _grade + ' | Попытка: ' + _attempt + (' | Подсказок: ' + _hintsUsed + '/3' + '') + (timerOn ? ' | ⏱ Таймер: ВКЛ' : ' | ⏱ Таймер: ВЫКЛ') + (violations > 0 ? ' | ⚠️ Покидал: ' + violations + ' раз' : ' | ✅ Не покидал');
  body.append('entry.994594767', _resultFull);
  body.append('entry.1290836239', xpEarned);
  fetch(formUrl, {method:'POST', body:body, mode:'no-cors'})
  .then(function(){
    var el=document.getElementById('send-status');
    if(el){el.textContent='✅ Результат отправлен преподавателю'; el.className='send-status ok';}
    var tel=document.getElementById('timer-status');
    if(tel){tel.textContent=timerOn?'⏱ Таймер: включён':'⏱ Таймер: выключен'; tel.className=timerOn?'timer-on':'timer-off';}
  }).catch(function(){
    var el=document.getElementById('send-status');
    if(el){el.textContent='⚠️ Нет соединения — результат не отправлен'; el.className='send-status err';}
    var tel=document.getElementById('timer-status');
    if(tel){tel.textContent=timerOn?'⏱ Таймер: включён':'⏱ Таймер: выключен'; tel.className=timerOn?'timer-on':'timer-off';}
  });
}


var violations = 0, testActive = false, MAX_VIOLATIONS = 1;
document.addEventListener('visibilitychange', function(){
  if(!testActive) return;
  if(document.hidden){
    violations++;
    if(violations > MAX_VIOLATIONS){
      testActive = false; // stop counting, reset immediately
    }
    showWarning();
  }
});
function showWarning(){
  var o=document.getElementById('warn-overlay'),icon=document.getElementById('warn-icon'),
      title=document.getElementById('warn-title'),text=document.getElementById('warn-text'),
      count=document.getElementById('warn-count'),btn=document.getElementById('warn-btn');
  if(violations > MAX_VIOLATIONS){
    // Immediate reset - no button, auto-reset after 3 seconds
    icon.textContent='🚫'; title.textContent='Тест сброшен!';
    text.textContent='Вы повторно покинули страницу. Тест сброшен автоматически.';
    count.textContent='Нарушений: '+violations; btn.textContent='Начать сначала';
    btn.className='warn-btn danger';
    btn.onclick=function(){ doReset(); };
    o.classList.add('open');
    setTimeout(function(){ doReset(); }, 3000);
  } else {
    icon.textContent='⚠️'; title.textContent='Предупреждение!';
    text.textContent='Вы покинули страницу. Следующее нарушение — тест сбросится автоматически!';
    count.textContent='Нарушение 1 из 1 допустимого';
    btn.textContent='Продолжить тест'; btn.className='warn-btn'; btn.onclick=closeWarning;
    o.classList.add('open');
  }
}
function doReset(){
  document.getElementById('warn-overlay').classList.remove('open');
  violations=0; testActive=false;
  // Try file-specific reset function first
  if(typeof goStart === 'function') { goStart(); return; }
  if(typeof restartStage === 'function') { restartStage(); return; }
  if(typeof restart === 'function') { restart(); return; }
  // Fallback: show start screen
  var ss=document.getElementById('start-screen'),qs=document.getElementById('quiz-screen'),rs=document.getElementById('result-screen');
  if(ss)ss.style.display=''; if(qs)qs.style.display='none'; if(rs)rs.style.display='none';
}
function closeWarning(){ document.getElementById('warn-overlay').classList.remove('open'); }


function getGrade(pct){
  if(pct >= 90) return '5 (Отлично)';
  if(pct >= 75) return '4 (Хорошо)';
  if(pct >= 50) return '3 (Удовл.)';
  if(pct >= 10) return '2 (Неудовл.)';
  return '1 (Не зачтено)';
}
function getAttemptNum(storageKey){
  try {
    var n = parseInt(localStorage.getItem(storageKey) || '0') + 1;
    localStorage.setItem(storageKey, n);
    return n;
  } catch(e){ return 1; }
}



function renderRootSections() {
  const T = TENSES['fut'];
  const el = document.getElementById('root-sections');
  if (!el || !T) return;
  setAccent(T.color);
  el.innerHTML = T.sections.filter(s=>!s.isExternal).map(s => {
    const key = 'fut_' + s.id;
    const rec = getRecord(key);
    const recHTML = rec ? '<div class="record-chip"><span class="stars-s">' + starsStr(rec.stars) + '</span> Рекорд: ' + rec.xp + ' XP · ' + rec.pct + '%</div>' : '';
    return '<button class="section-btn" onclick="startSection(\'fut\',\''+s.id+'\');" style="border-top:3px solid #6B2FA0;margin-bottom:10px;">' +
      '<div class="sb-icon ' + s.iclass + '">' + s.icon + '</div>' +
      '<div><div class="sb-title">' + s.title + '</div><div class="sb-sub">' + s.sub + '</div>' + recHTML + '</div>' +
      '<div class="sb-arrow">→</div></button>';
  }).join('');
}

function goRoot() {
  stopTimer();
  setAccent('#6B2FA0');
  showScreen('root-hub');
  renderRootSections();
}

const _origStartSection = startSection;
startSection = function(tense, section) {
  navState = {tense, section, mixMode:null};
  const T = TENSES[tense];
  setAccent(T.color);
  document.getElementById('quiz-header').style.background = T.color;
  document.getElementById('prog').style.background = T.color;
  document.getElementById('quiz-back-btn').onclick = goRoot;
  document.querySelectorAll('.hud-chip b').forEach(b=>b.style.color=T.color);
  document.getElementById('quiz-title').textContent = SECTION_LABELS[section];
  buildAndStartSection(tense, section);
  showScreen('quiz-screen');
};

document.addEventListener('DOMContentLoaded', function() {
  setAccent('#6B2FA0');
  renderRootSections();
});
